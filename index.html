<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reverie — Игра ассоциаций</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0d1117;
  --bg-card: #161b22;
  --bg-surface: #1c2333;
  --gold: #e8a83e;
  --gold-dim: #b8862e;
  --gold-glow: rgba(232, 168, 62, 0.3);
  --amber: #f0c060;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #484f58;
  --accent-blue: #58a6ff;
  --accent-purple: #bc8cff;
  --accent-rose: #f78166;
  --success: #56d364;
  --danger: #f85149;
  --card-w: 120px;
  --card-h: 168px;
  --radius: 12px;
  --transition: 0.3s ease;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

h1, h2, h3 {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
}

button {
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  border: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

input {
  font-family: 'Inter', sans-serif;
  outline: none;
}

/* ============================================================
   APP CONTAINER & SCREENS
   ============================================================ */
#app {
  width: 100%; height: 100%;
  position: relative;
  overflow: hidden;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  overflow-y: auto;
  background: radial-gradient(ellipse at 50% 40%, #1a2340 0%, var(--bg-deep) 70%);
}
.screen.active {
  opacity: 1;
  pointer-events: auto;
}

/* ============================================================
   SHARED UI
   ============================================================ */
.btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-dim));
  color: var(--bg-deep);
  font-weight: 600;
  font-size: 16px;
  padding: 14px 36px;
  border-radius: 50px;
  letter-spacing: 0.5px;
  transition: transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 20px var(--gold-glow);
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.4; pointer-events: none; }
.btn--secondary {
  background: var(--bg-surface);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border: 1px solid var(--text-muted);
}
.btn--small { font-size: 14px; padding: 10px 24px; }

.phase-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 8px;
}

.clue-display {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 24px;
  color: var(--amber);
  text-align: center;
  margin: 12px 0;
  padding: 12px 24px;
  border-left: 3px solid var(--gold-dim);
  max-width: 400px;
  word-break: break-word;
}

.input-field {
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 15px;
  transition: border-color var(--transition);
  width: 100%;
  max-width: 300px;
}
.input-field:focus { border-color: var(--gold); }

.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.gap-20 { gap: 20px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mt-12 { margin-top: 12px; }
.text-center { text-align: center; }
.text-dim { color: var(--text-dim); }
.text-small { font-size: 13px; }
.text-gold { color: var(--gold); }

/* ============================================================
   TITLE SCREEN
   ============================================================ */
.title-logo {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--amber), #f4d896);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  text-align: center;
}
.title-sub {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--text-dim);
  margin-bottom: 48px;
}
.title-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.title-particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-100vh) scale(1); }
}
.title-buttons {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

/* ============================================================
   LOBBY SCREEN
   ============================================================ */
.room-code-box {
  background: var(--bg-surface);
  border: 2px dashed var(--gold-dim);
  border-radius: 16px;
  padding: 16px 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition);
  position: relative;
}
.room-code-box:active { border-color: var(--gold); }
.room-code-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.room-code {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 8px;
}
.room-code-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}
.copied-toast {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--success);
  color: var(--bg-deep);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.3s;
}
.copied-toast.show { opacity: 1; }

.player-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 300px;
}
.player-list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--bg-surface);
  border-radius: 10px;
  font-size: 15px;
}
.player-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}
.player-list-item .host-badge {
  font-size: 10px;
  color: var(--gold);
  margin-left: auto;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Score switch */
.score-switch {
  display: flex;
  gap: 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--text-muted);
}
.score-option {
  padding: 10px 20px;
  background: var(--bg-surface);
  color: var(--text-dim);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
}
.score-option.active {
  background: var(--gold);
  color: var(--bg-deep);
}

/* ============================================================
   GAME SCREEN
   ============================================================ */
#game-screen {
  justify-content: flex-start;
  padding-top: 0;
  padding-bottom: 16px;
}

.game-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(0,0,0,0.3);
  flex-shrink: 0;
}
.game-header .round-info {
  font-size: 13px;
  color: var(--text-dim);
}
.game-header .round-info b {
  color: var(--gold);
  font-weight: 600;
}
.game-header .my-name {
  font-size: 13px;
  color: var(--accent-purple);
  font-weight: 500;
}

/* Sidebar scoreboard (floating) */
.scores-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 100;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  color: var(--gold);
  font-size: 18px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.scores-toggle.visible { display: flex; }

.scores-panel {
  position: fixed;
  top: 0; right: 0;
  width: 260px;
  height: 100%;
  background: var(--bg-surface);
  border-left: 1px solid var(--text-muted);
  z-index: 99;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
}
.scores-panel.open { transform: translateX(0); }
.scores-panel-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--gold);
  margin-bottom: 8px;
}
.scores-panel-close {
  position: absolute;
  top: 12px; right: 12px;
  background: none;
  color: var(--text-dim);
  font-size: 22px;
  cursor: pointer;
}
.sp-entry {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  font-size: 14px;
}
.sp-entry.storyteller { border-left: 3px solid var(--gold); }
.sp-entry .sp-name { font-weight: 500; }
.sp-entry .sp-pts { color: var(--accent-blue); font-weight: 600; }
.sp-entry.storyteller .sp-name { color: var(--gold); }

/* Game body */
.game-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  width: 100%;
  overflow-y: auto;
  padding: 12px 0;
}

/* Waiting state */
.waiting-msg {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--text-dim);
  text-align: center;
  max-width: 320px;
}
.waiting-progress {
  font-size: 14px;
  color: var(--text-muted);
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.waiting-dots {
  animation: pulse 1.5s ease-in-out infinite;
}

/* Clue input */
.clue-input-area {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 400px;
  align-items: center;
}
.clue-input-area input {
  flex: 1;
}

/* Cards */
.hand-area {
  display: flex;
  gap: 10px;
  padding: 12px 8px;
  overflow-x: auto;
  max-width: 100%;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--text-muted) transparent;
  justify-content: center;
  flex-wrap: wrap;
}

.card-container {
  width: var(--card-w);
  min-width: var(--card-w);
  height: var(--card-h);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
  border: 2px solid var(--text-muted);
  cursor: pointer;
  transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  position: relative;
  flex-shrink: 0;
}
.card-container:active { transform: scale(0.97); }
.card-container.selected {
  border-color: var(--gold);
  box-shadow: 0 0 16px var(--gold-glow), 0 8px 24px rgba(0,0,0,0.4);
  transform: translateY(-6px);
}
.card-container.disabled { opacity: 0.35; pointer-events: none; }
.card-container.storyteller-card {
  box-shadow: 0 0 20px var(--gold-glow), 0 0 40px var(--gold-glow);
  border: 2px solid var(--gold);
}
.card-container img {
  width: 100%; height: 100%;
  display: block;
  object-fit: cover;
}
.card-number {
  position: absolute;
  bottom: 4px; right: 6px;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  font-weight: 600;
  pointer-events: none;
}

/* Voting grid */
.voting-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  max-width: 560px;
}
.voting-grid .card-container {
  width: 110px; min-width: 110px; height: 154px;
}

/* Results */
.results-cards-area {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
  max-width: 600px;
}
.result-card-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.result-card-wrapper .owner-label {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
}
.result-card-wrapper .owner-label.storyteller {
  color: var(--gold);
  font-weight: 600;
}
.result-card-wrapper .votes-list {
  font-size: 11px;
  color: var(--accent-blue);
  text-align: center;
}
.score-changes {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
  max-width: 360px;
}
.score-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-surface);
  border-radius: 8px;
}
.score-row .name { font-weight: 500; }
.score-row .points { color: var(--success); font-weight: 600; }
.score-row .points.zero { color: var(--text-muted); }

/* Game over overlay */
.game-over-banner {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: var(--amber);
  text-align: center;
  margin-bottom: 8px;
}

/* Error / status bar */
.status-bar {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: var(--danger);
  color: white;
  text-align: center;
  padding: 10px;
  font-size: 14px;
  font-weight: 500;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.3s;
}
.status-bar.show { transform: translateY(0); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 480px) {
  .title-logo { font-size: 44px; }
  .title-sub { font-size: 15px; }
  .room-code { font-size: 36px; }
  :root { --card-w: 95px; --card-h: 133px; }
  .voting-grid .card-container { width: 90px; min-width: 90px; height: 126px; }
  .clue-display { font-size: 20px; }
}
@media (max-width: 360px) {
  :root { --card-w: 80px; --card-h: 112px; }
  .voting-grid .card-container { width: 78px; min-width: 78px; height: 109px; }
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }
</style>
</head>
<body>

<div id="app">
  <!-- TITLE -->
  <div id="title-screen" class="screen active">
    <div class="title-particles" id="title-particles"></div>
    <div class="title-logo">Reverie</div>
    <div class="title-sub">игра ассоциаций</div>
    <div class="title-buttons">
      <button class="btn" onclick="showCreate()">Создать игру</button>
      <button class="btn btn--secondary" onclick="showJoin()">Присоединиться</button>
    </div>
  </div>

  <!-- CREATE GAME -->
  <div id="create-screen" class="screen">
    <h2 style="font-size:24px;color:var(--gold);margin-bottom:16px;">Создать игру</h2>
    <input class="input-field mb-16" id="create-name" type="text" placeholder="Твой никнейм" maxlength="20" autocomplete="off">
    <p class="text-dim text-small mb-8">Играть до:</p>
    <div class="score-switch mb-16">
      <button class="score-option active" data-score="32" onclick="pickScore(this)">32</button>
      <button class="score-option" data-score="54" onclick="pickScore(this)">54</button>
      <button class="score-option" data-score="67" onclick="pickScore(this)">67</button>
    </div>
    <button class="btn" id="create-btn" onclick="doCreate()">Создать</button>
    <button class="btn btn--secondary btn--small mt-12" onclick="showTitle()">Назад</button>
    <p id="create-status" class="text-dim text-small mt-12" style="display:none;"></p>
  </div>

  <!-- JOIN GAME -->
  <div id="join-screen" class="screen">
    <h2 style="font-size:24px;color:var(--gold);margin-bottom:16px;">Присоединиться</h2>
    <input class="input-field mb-16" id="join-name" type="text" placeholder="Твой никнейм" maxlength="20" autocomplete="off">
    <input class="input-field mb-16" id="join-code" type="text" placeholder="Код комнаты" maxlength="4" autocomplete="off" style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:20px;">
    <button class="btn" id="join-btn" onclick="doJoin()">Войти</button>
    <button class="btn btn--secondary btn--small mt-12" onclick="showTitle()">Назад</button>
    <p id="join-status" class="text-dim text-small mt-12" style="display:none;"></p>
  </div>

  <!-- LOBBY -->
  <div id="lobby-screen" class="screen">
    <div class="room-code-box" id="room-code-box" onclick="copyCode()">
      <div class="room-code-label">Код комнаты</div>
      <div class="room-code" id="lobby-code"></div>
      <div class="room-code-hint">нажми чтобы скопировать</div>
      <div class="copied-toast" id="copied-toast">Скопировано!</div>
    </div>
    <p class="text-dim text-small mt-12 mb-8">Игроки:</p>
    <div class="player-list" id="lobby-players"></div>
    <p class="text-dim text-small mt-12" id="lobby-score-label"></p>
    <button class="btn mt-12" id="lobby-start-btn" onclick="doStartGame()" style="display:none;">Начать игру</button>
    <p class="text-dim text-small mt-12" id="lobby-wait" style="display:none;">Ожидание хоста...</p>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <span class="round-info">Раунд <b id="gh-round">1</b></span>
      <span class="my-name" id="gh-name"></span>
    </div>
    <div class="game-body" id="game-body"></div>
  </div>
</div>

<!-- Floating scores toggle -->
<button class="scores-toggle" id="scores-toggle" onclick="toggleScores()">★</button>
<div class="scores-panel" id="scores-panel">
  <button class="scores-panel-close" onclick="toggleScores()">&times;</button>
  <div class="scores-panel-title">Очки</div>
  <div id="scores-list"></div>
</div>

<!-- Status bar -->
<div class="status-bar" id="status-bar"></div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const IMAGE_FILES = [
  '1E8B0269-6F4A-455E-8E32-D92A80529A71.JPG',
  '4A06414C-606A-4326-B9AF-F92E56E52264 (1).JPG',
  '85D134AB-4E4B-47BE-AB7F-36E0E29F8533.PNG',
  'B21DBD94-BA39-463A-A9CB-2D0B5E08CACB.JPG',
  'DF91EC43-7970-485D-B1C5-4FFDF61A77A2 (1).PNG',
  'IMG_6773.JPG',
  'IMG_6944.JPG',
  'IMG_7085.JPG'
];
const HAND_SIZE = 2;
const PEER_PREFIX = 'reverie-game-';

// ============================================================
// STATE
// ============================================================

/* Network state */
const NET = {
  peer: null,
  isHost: false,
  roomCode: '',
  myName: '',
  myIdx: -1,
  hostConn: null,       // client: connection to host
  conns: [],            // host: [{conn, playerIdx}]
};

/* Host-authoritative game state */
const HOST = {
  players: [],          // [{name, score, hand:[], conn:null}]
  allCardIds: [],
  deck: [],
  phase: 'lobby',
  round: 0,
  winScore: 32,
  storytellerIdx: 0,
  storytellerCard: null,
  clue: '',
  contributions: [],    // [{playerIdx, cardId}]
  votes: [],            // [{voterIdx, cardId}]
  shuffledPool: [],     // [{cardId, ownerIdx}]
  roundScores: {},
};

/* Local client state */
let localState = null;  // last state received from host
let selectedCard = null;

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // Show/hide scores toggle
  const toggle = document.getElementById('scores-toggle');
  toggle.classList.toggle('visible', id === 'game-screen');
  if (id !== 'game-screen') {
    document.getElementById('scores-panel').classList.remove('open');
  }
}

function showTitle() {
  if (NET.peer) { NET.peer.destroy(); NET.peer = null; }
  NET.hostConn = null;
  NET.conns = [];
  showScreen('title-screen');
}

function showCreate() { showScreen('create-screen'); }
function showJoin() { showScreen('join-screen'); }

function showStatus(msg) {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 3000);
}

// ============================================================
// TITLE PARTICLES
// ============================================================
(function() {
  const c = document.getElementById('title-particles');
  const colors = ['#e8a83e', '#f0c060', '#bc8cff', '#58a6ff', '#f78166'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'title-particle';
    const size = 3 + Math.random() * 6;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '-10px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    c.appendChild(p);
  }
})();

// ============================================================
// SCORE SWITCH
// ============================================================
function pickScore(el) {
  document.querySelectorAll('.score-option').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function getSelectedScore() {
  const active = document.querySelector('.score-option.active');
  return active ? parseInt(active.dataset.score) : 32;
}

// ============================================================
// UTILITY
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function createCardElement(cardId, opts = {}) {
  const div = document.createElement('div');
  div.className = 'card-container';
  if (opts.disabled) div.classList.add('disabled');
  if (opts.storyteller) div.classList.add('storyteller-card');
  div.dataset.cardId = cardId;
  const img = document.createElement('img');
  // cardId is like "card_3" → index 3
  const idx = parseInt(cardId.split('_')[1]);
  img.src = IMAGE_FILES[idx];
  img.draggable = false;
  div.appendChild(img);
  if (opts.label) {
    const lbl = document.createElement('span');
    lbl.className = 'card-number';
    lbl.textContent = opts.label;
    div.appendChild(lbl);
  }
  return div;
}

function copyCode() {
  navigator.clipboard.writeText(NET.roomCode).catch(() => {});
  const toast = document.getElementById('copied-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

function toggleScores() {
  document.getElementById('scores-panel').classList.toggle('open');
}

// ============================================================
// PEERJS — CREATE ROOM (HOST)
// ============================================================
function doCreate() {
  const name = document.getElementById('create-name').value.trim();
  if (!name) return;
  const status = document.getElementById('create-status');
  status.style.display = 'block';
  status.textContent = 'Подключение...';
  document.getElementById('create-btn').disabled = true;

  NET.myName = name;
  NET.isHost = true;
  NET.roomCode = genRoomCode();
  NET.myIdx = 0;

  HOST.winScore = getSelectedScore();
  HOST.players = [{ name, score: 0, hand: [], conn: null }];
  HOST.phase = 'lobby';

  const peerId = PEER_PREFIX + NET.roomCode;
  NET.peer = new Peer(peerId, { debug: 0 });

  NET.peer.on('open', () => {
    status.style.display = 'none';
    document.getElementById('create-btn').disabled = false;
    showLobby();
  });

  NET.peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      // Room code collision — retry
      NET.roomCode = genRoomCode();
      NET.peer.destroy();
      doCreate();
      return;
    }
    status.textContent = 'Ошибка: ' + err.message;
    document.getElementById('create-btn').disabled = false;
  });

  NET.peer.on('connection', (conn) => {
    conn.on('open', () => {
      conn.on('data', (data) => hostOnMessage(conn, data));
    });
    conn.on('close', () => hostOnDisconnect(conn));
  });
}

// ============================================================
// PEERJS — JOIN ROOM (CLIENT)
// ============================================================
function doJoin() {
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name || code.length !== 4) return;

  const status = document.getElementById('join-status');
  status.style.display = 'block';
  status.textContent = 'Подключение...';
  document.getElementById('join-btn').disabled = true;

  NET.myName = name;
  NET.isHost = false;
  NET.roomCode = code;

  NET.peer = new Peer(undefined, { debug: 0 });

  NET.peer.on('open', () => {
    const conn = NET.peer.connect(PEER_PREFIX + code, { reliable: true });
    NET.hostConn = conn;

    conn.on('open', () => {
      conn.send({ type: 'join', name });
    });

    conn.on('data', (data) => clientOnMessage(data));

    conn.on('close', () => {
      showStatus('Соединение с хостом потеряно');
      showTitle();
    });

    conn.on('error', () => {
      status.textContent = 'Не удалось подключиться';
      document.getElementById('join-btn').disabled = false;
    });

    // Timeout
    setTimeout(() => {
      if (!conn.open) {
        status.textContent = 'Комната не найдена';
        document.getElementById('join-btn').disabled = false;
        conn.close();
      }
    }, 8000);
  });

  NET.peer.on('error', (err) => {
    status.textContent = 'Ошибка: ' + err.message;
    document.getElementById('join-btn').disabled = false;
  });
}

// ============================================================
// LOBBY
// ============================================================
function showLobby() {
  document.getElementById('lobby-code').textContent = NET.roomCode;
  updateLobbyUI();
  showScreen('lobby-screen');
}

function updateLobbyUI() {
  const list = document.getElementById('lobby-players');
  const players = NET.isHost ? HOST.players : (localState?.players || []);
  list.innerHTML = '';
  players.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'player-list-item';
    item.innerHTML = `
      <span class="player-dot"></span>
      <span>${p.name}</span>
      ${i === 0 ? '<span class="host-badge">хост</span>' : ''}
    `;
    list.appendChild(item);
  });

  const ws = NET.isHost ? HOST.winScore : (localState?.winScore || 32);
  scoreLabel.textContent = `Играем до ${ws} очков`;

    waitMsg.style.display = 'none';
  } else {
    startBtn.style.display = 'none';
    waitMsg.style.display = 'block';
  }
}

// ============================================================
// HOST — MESSAGE HANDLING
// ============================================================
function hostOnMessage(conn, data) {
  if (data.type === 'join') {
    if (HOST.phase !== 'lobby') {
      conn.send({ type: 'error', msg: 'Игра уже началась' });
      return;
    }
    if (HOST.players.length >= 4) {
      conn.send({ type: 'error', msg: 'Комната заполнена (макс. 4)' });
      return;
    }
    const idx = HOST.players.length;
    HOST.players.push({ name: data.name, score: 0, hand: [], conn });
    NET.conns.push({ conn, playerIdx: idx });
    conn.send({ type: 'joined', playerIdx: idx });
    hostBroadcastLobby();
    updateLobbyUI();
    return;
  }

  // Find player idx for this connection
  const entry = NET.conns.find(c => c.conn === conn);
  if (!entry) return;
  const pidx = entry.playerIdx;

  if (data.type === 'storyteller') {
    hostOnStoryteller(pidx, data.cardId, data.clue);
  } else if (data.type === 'contribute') {
    hostOnContribute(pidx, data.cardId);
  } else if (data.type === 'vote') {
    hostOnVote(pidx, data.cardId);
  }
}

function hostOnDisconnect(conn) {
  const entry = NET.conns.find(c => c.conn === conn);
  if (!entry) return;
  const name = HOST.players[entry.playerIdx]?.name || '?';
  showStatus(`${name} отключился`);
  // In lobby: remove player
  if (HOST.phase === 'lobby') {
    HOST.players.splice(entry.playerIdx, 1);
    NET.conns = NET.conns.filter(c => c.conn !== conn);
    // Re-index
    NET.conns.forEach((c, i) => c.playerIdx = i + 1);
    hostBroadcastLobby();
    updateLobbyUI();
  }
}

function hostBroadcastLobby() {
  const msg = {
    type: 'lobby',
    players: HOST.players.map(p => ({ name: p.name })),
    winScore: HOST.winScore,
    roomCode: NET.roomCode
  };
  NET.conns.forEach(c => c.conn.send(msg));
}

function hostBroadcast(msg) {
  NET.conns.forEach(c => c.conn.send(msg));
}

/* Send personalized state to each player */
function hostSendState() {
  const base = {
    type: 'state',
    phase: HOST.phase,
    players: HOST.players.map(p => ({ name: p.name, score: p.score })),
    round: HOST.round,
    winScore: HOST.winScore,
    storytellerIdx: HOST.storytellerIdx,
    clue: HOST.clue,
    contributedCount: HOST.contributions.length - 1, // minus storyteller
    totalNonSt: HOST.players.length - 1,
    votedCount: HOST.votes.length,
  };

  HOST.players.forEach((p, idx) => {
    const state = { ...base, myIdx: idx, hand: [...p.hand] };

    // Vote phase: send shuffled pool
    if (HOST.phase === 'vote' || HOST.phase === 'results') {
      state.pool = HOST.shuffledPool.map(e => e.cardId);
    }
    if (HOST.phase === 'vote') {
      state.ownCardId = HOST.contributions.find(c => c.playerIdx === idx)?.cardId;
      state.alreadyVoted = HOST.votes.some(v => v.voterIdx === idx);
    }
    if (HOST.phase === 'results') {
      state.results = {
        storytellerCard: HOST.storytellerCard,
        pool: HOST.shuffledPool.map(e => ({
          cardId: e.cardId,
          ownerIdx: e.ownerIdx,
          ownerName: HOST.players[e.ownerIdx].name,
          isStoryteller: e.cardId === HOST.storytellerCard,
          voters: HOST.votes.filter(v => v.cardId === e.cardId).map(v => HOST.players[v.voterIdx].name)
        })),
        roundScores: HOST.roundScores,
        isGameOver: HOST.players.some(p => p.score >= HOST.winScore)
      };
    }

    if (idx === 0) {
      // Host player — handle locally
      localState = state;
      renderGame(state);
    } else {
      p.conn?.send(state);
    }
  });
}

// ============================================================
// HOST — GAME LOGIC
// ============================================================
function doStartGame() {
  if (HOST.players.length < 2) return;

  // Generate card IDs
  HOST.allCardIds = IMAGE_FILES.map((_, i) => 'card_' + i);
  HOST.round = 0;
  HOST.storytellerIdx = 0;

  // Reset scores
  HOST.players.forEach(p => { p.score = 0; p.hand = []; });

  // Deal initial hands
  HOST.deck = shuffle([...HOST.allCardIds]);
  HOST.players.forEach(p => {
    for (let i = 0; i < HAND_SIZE; i++) {
      if (HOST.deck.length > 0) p.hand.push(HOST.deck.pop());
    }
  });

  hostStartRound();
}

function hostStartRound() {
  HOST.round++;
  HOST.storytellerCard = null;
  HOST.clue = '';
  HOST.contributions = [];
  HOST.votes = [];
  HOST.shuffledPool = [];
  HOST.roundScores = {};
  HOST.phase = 'storyteller';

  hostSendState();
}

function hostOnStoryteller(pidx, cardId, clue) {
  if (HOST.phase !== 'storyteller' || pidx !== HOST.storytellerIdx) return;
  HOST.storytellerCard = cardId;
  HOST.clue = clue;
  // Remove card from hand
  HOST.players[pidx].hand = HOST.players[pidx].hand.filter(c => c !== cardId);
  HOST.contributions.push({ playerIdx: pidx, cardId });
  HOST.phase = 'contribute';
  hostSendState();

  // If only 2 players, skip to vote if the other has auto-contributed (they won't — need to pick)
  // Check if all non-storytellers have contributed
  checkContributeDone();
}

function hostOnContribute(pidx, cardId) {
  if (HOST.phase !== 'contribute') return;
  if (pidx === HOST.storytellerIdx) return;
  if (HOST.contributions.find(c => c.playerIdx === pidx)) return; // already contributed
  HOST.players[pidx].hand = HOST.players[pidx].hand.filter(c => c !== cardId);
  HOST.contributions.push({ playerIdx: pidx, cardId });
  hostSendState(); // update progress
  checkContributeDone();
}

function checkContributeDone() {
  const needed = HOST.players.length; // storyteller + all others
  if (HOST.contributions.length >= needed) {
    HOST.shuffledPool = shuffle(HOST.contributions.map(c => ({ cardId: c.cardId, ownerIdx: c.playerIdx })));
    HOST.phase = 'vote';
    hostSendState();
    checkVoteDone(); // in case storyteller auto-skips
  }
}

function hostOnVote(pidx, cardId) {
  if (HOST.phase !== 'vote') return;
  if (pidx === HOST.storytellerIdx) return;
  if (HOST.votes.find(v => v.voterIdx === pidx)) return;
  HOST.votes.push({ voterIdx: pidx, cardId });
  hostSendState();
  checkVoteDone();
}

function checkVoteDone() {
  const needed = HOST.players.length - 1; // all except storyteller
  if (HOST.votes.length >= needed) {
    calculateScores();
    HOST.phase = 'results';
    hostSendState();
  }
}

function calculateScores() {
  const scores = {};
  HOST.players.forEach((_, i) => scores[i] = 0);

  const stCard = HOST.storytellerCard;
  const stIdx = HOST.storytellerIdx;
  const nonSt = HOST.players.map((_, i) => i).filter(i => i !== stIdx);
  const correctVoters = HOST.votes.filter(v => v.cardId === stCard);
  const allFound = correctVoters.length === nonSt.length;
  const noneFound = correctVoters.length === 0;

  if (allFound || noneFound) {
    nonSt.forEach(i => scores[i] += 2);
  } else {
    scores[stIdx] += 3;
    correctVoters.forEach(v => scores[v.voterIdx] += 3);
  }

  // Bluff bonus
  nonSt.forEach(ownerIdx => {
    const ownerCard = HOST.contributions.find(c => c.playerIdx === ownerIdx)?.cardId;
    if (!ownerCard) return;
    const votesOn = HOST.votes.filter(v => v.cardId === ownerCard).length;
    scores[ownerIdx] += votesOn;
  });

  // Apply
  HOST.players.forEach((p, i) => p.score += scores[i]);
  HOST.roundScores = scores;
}

function hostNextRound() {
  // Check game over
  if (HOST.players.some(p => p.score >= HOST.winScore)) {
    // Game is over — results already show this
    return;
  }

  // Rotate storyteller
  HOST.storytellerIdx = (HOST.storytellerIdx + 1) % HOST.players.length;

  // Recycle cards
  const inHands = new Set();
  HOST.players.forEach(p => p.hand.forEach(c => inHands.add(c)));
  HOST.deck = shuffle(HOST.allCardIds.filter(id => !inHands.has(id)));

  HOST.players.forEach(p => {
    while (p.hand.length < HAND_SIZE && HOST.deck.length > 0) {
      p.hand.push(HOST.deck.pop());
    }
  });

  hostStartRound();
}

// ============================================================
// CLIENT — MESSAGE HANDLING
// ============================================================
function clientOnMessage(data) {
  if (data.type === 'joined') {
    NET.myIdx = data.playerIdx;
    return;
  }
  if (data.type === 'lobby') {
    localState = data;
    document.getElementById('lobby-code').textContent = data.roomCode;
    document.getElementById('join-status').style.display = 'none';
    document.getElementById('join-btn').disabled = false;
    updateLobbyUI();
    showScreen('lobby-screen');
    return;
  }
  if (data.type === 'state') {
    localState = data;
    renderGame(data);
    return;
  }
  if (data.type === 'error') {
    showStatus(data.msg);
    return;
  }
}

function sendToHost(msg) {
  if (NET.isHost) {
    // Host player — handle locally
    hostOnMessage(null, { ...msg, _fromHost: true });
  } else if (NET.hostConn) {
    NET.hostConn.send(msg);
  }
}

// ============================================================
// GAME RENDERING
// ============================================================
function renderGame(state) {
  if (!state || state.type !== 'state') return;
  showScreen('game-screen');

  // Header
  document.getElementById('gh-round').textContent = state.round;
  document.getElementById('gh-name').textContent = state.players[state.myIdx]?.name || '';

  // Scores panel
  updateScoresPanel(state);

  const body = document.getElementById('game-body');
  body.innerHTML = '';

  switch (state.phase) {
    case 'storyteller':
      renderStoryteller(body, state);
      break;
    case 'contribute':
      renderContribute(body, state);
      break;
    case 'vote':
      renderVote(body, state);
      break;
    case 'results':
      renderResults(body, state);
      break;
  }
}

function updateScoresPanel(state) {
  const list = document.getElementById('scores-list');
  list.innerHTML = '';
  const sorted = state.players.map((p, i) => ({ ...p, idx: i }))
    .sort((a, b) => b.score - a.score);
  sorted.forEach(p => {
    const div = document.createElement('div');
    div.className = 'sp-entry' + (p.idx === state.storytellerIdx ? ' storyteller' : '');
    div.innerHTML = `
      <span class="sp-name">${p.name}${p.idx === state.storytellerIdx ? ' ★' : ''}</span>
      <span class="sp-pts">${p.score}</span>
    `;
    list.appendChild(div);
  });
}

// --- STORYTELLER PHASE ---
function renderStoryteller(body, state) {
  const isSt = state.myIdx === state.storytellerIdx;
  const stName = state.players[state.storytellerIdx].name;

  if (isSt) {
    body.innerHTML = `
      <div class="phase-label">Ты — рассказчик</div>
      <p class="text-dim text-small text-center" style="max-width:340px;">
        Выбери карту из руки и придумай к ней ассоциацию — слово, фразу или чувство.
      </p>
      <div class="hand-area" id="st-hand"></div>
      <div class="clue-input-area">
        <input class="input-field" id="clue-input" type="text" placeholder="Твоя ассоциация…" maxlength="100" autocomplete="off">
        <button class="btn btn--small" id="submit-clue-btn" onclick="doSubmitClue()" disabled>Ок</button>
      </div>
    `;
    selectedCard = null;
    const hand = document.getElementById('st-hand');
    state.hand.forEach(cardId => {
      const el = createCardElement(cardId);
      el.addEventListener('click', () => {
        hand.querySelectorAll('.card-container').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedCard = cardId;
        updateClueBtn();
      });
      hand.appendChild(el);
    });
    document.getElementById('clue-input').addEventListener('input', updateClueBtn);
  } else {
    body.innerHTML = `
      <div class="waiting-msg">${stName} придумывает ассоциацию<span class="waiting-dots">...</span></div>
    `;
  }
}

function updateClueBtn() {
  const btn = document.getElementById('submit-clue-btn');
  if (!btn) return;
  const clue = document.getElementById('clue-input')?.value.trim();
  btn.disabled = !(selectedCard && clue);
}

function doSubmitClue() {
  const clue = document.getElementById('clue-input').value.trim();
  if (!selectedCard || !clue) return;
  if (NET.isHost) {
    hostOnStoryteller(0, selectedCard, clue);
  } else {
    sendToHost({ type: 'storyteller', cardId: selectedCard, clue });
  }
}

// --- CONTRIBUTE PHASE ---
function renderContribute(body, state) {
  const isSt = state.myIdx === state.storytellerIdx;
  const alreadyContributed = state.contributedCount >= state.totalNonSt;

  if (isSt) {
    body.innerHTML = `
      <div class="phase-label">Ассоциация</div>
      <div class="clue-display">"${state.clue}"</div>
      <div class="waiting-msg">Игроки выбирают карты<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.contributedCount} / ${state.totalNonSt}</div>
    `;
    return;
  }

  // Check if already contributed
  const myContrib = state.hand.length < HAND_SIZE; // crude check: hand shrinks after contributing
  // Better: server sends explicit flag
  if (state.hand.length < HAND_SIZE) {
    body.innerHTML = `
      <div class="phase-label">Ассоциация</div>
      <div class="clue-display">"${state.clue}"</div>
      <div class="waiting-msg">Ожидание остальных<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.contributedCount} / ${state.totalNonSt}</div>
    `;
    return;
  }

  body.innerHTML = `
    <div class="phase-label">Блеф</div>
    <div class="clue-display">"${state.clue}"</div>
    <p class="text-dim text-small text-center" style="max-width:320px;">
      Выбери карту, которая тоже подходит под эту ассоциацию.
    </p>
    <div class="hand-area" id="ct-hand"></div>
    <button class="btn btn--small" id="submit-ct-btn" onclick="doSubmitContribute()" disabled>Отправить</button>
  `;
  selectedCard = null;
  const hand = document.getElementById('ct-hand');
  state.hand.forEach(cardId => {
    const el = createCardElement(cardId);
    el.addEventListener('click', () => {
      hand.querySelectorAll('.card-container').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedCard = cardId;
      document.getElementById('submit-ct-btn').disabled = false;
    });
    hand.appendChild(el);
  });
}

function doSubmitContribute() {
  if (!selectedCard) return;
  if (NET.isHost) {
    hostOnContribute(0, selectedCard);
  } else {
    sendToHost({ type: 'contribute', cardId: selectedCard });
  }
}

// --- VOTE PHASE ---
function renderVote(body, state) {
  const isSt = state.myIdx === state.storytellerIdx;

  if (isSt) {
    body.innerHTML = `
      <div class="phase-label">Голосование</div>
      <div class="clue-display">"${state.clue}"</div>
      <div class="voting-grid" id="vt-grid"></div>
      <div class="waiting-msg" style="font-size:16px;">Игроки голосуют<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.votedCount} / ${state.totalNonSt}</div>
    `;
    const grid = document.getElementById('vt-grid');
    state.pool.forEach((cardId, i) => {
      const el = createCardElement(cardId, { label: String(i + 1) });
      el.style.cursor = 'default';
      grid.appendChild(el);
    });
    return;
  }

  if (state.alreadyVoted) {
    body.innerHTML = `
      <div class="phase-label">Голосование</div>
      <div class="clue-display">"${state.clue}"</div>
      <div class="waiting-msg">Ожидание остальных<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.votedCount} / ${state.totalNonSt}</div>
    `;
    return;
  }

  body.innerHTML = `
    <div class="phase-label">Голосование</div>
    <div class="clue-display">"${state.clue}"</div>
    <p class="text-dim text-small text-center">Какая карта принадлежит рассказчику?</p>
    <div class="voting-grid" id="vt-grid"></div>
    <button class="btn btn--small" id="submit-vt-btn" onclick="doSubmitVote()" disabled>Голосовать</button>
  `;
  selectedCard = null;
  const grid = document.getElementById('vt-grid');
  state.pool.forEach((cardId, i) => {
    const isOwn = cardId === state.ownCardId;
    const el = createCardElement(cardId, { disabled: isOwn, label: String(i + 1) });
    el.addEventListener('click', () => {
      if (isOwn) return;
      grid.querySelectorAll('.card-container').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedCard = cardId;
      document.getElementById('submit-vt-btn').disabled = false;
    });
    grid.appendChild(el);
  });
}

function doSubmitVote() {
  if (!selectedCard) return;
  if (NET.isHost) {
    hostOnVote(0, selectedCard);
  } else {
    sendToHost({ type: 'vote', cardId: selectedCard });
  }
}

// --- RESULTS PHASE ---
function renderResults(body, state) {
  const res = state.results;
  if (!res) return;

  const isGameOver = res.isGameOver;
  let html = '';

  if (isGameOver) {
    const winner = state.players.reduce((a, b) => a.score >= b.score ? a : b);
    html += `<div class="game-over-banner">${winner.name} побеждает с ${winner.score} очками!</div>`;
  }

  html += `<div class="phase-label">Раскрытие</div>`;
  html += `<div class="clue-display">"${state.clue}"</div>`;
  html += `<div class="results-cards-area">`;
  res.pool.forEach(entry => {
    const isSt = entry.isStoryteller;
    html += `<div class="result-card-wrapper">`;
    html += `<div class="card-container${isSt ? ' storyteller-card' : ''}" style="cursor:default;">`;
    const idx = parseInt(entry.cardId.split('_')[1]);
    html += `<img src="${IMAGE_FILES[idx]}" draggable="false" style="width:100%;height:100%;display:block;object-fit:cover;">`;
    html += `</div>`;
    html += `<div class="owner-label${isSt ? ' storyteller' : ''}">${entry.ownerName}${isSt ? ' ★' : ''}</div>`;
    if (entry.voters.length > 0) {
      html += `<div class="votes-list">Голоса: ${entry.voters.join(', ')}</div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;

  // Score changes
  html += `<div class="score-changes">`;
  html += `<div style="color:var(--text-dim);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Очки за раунд</div>`;
  const sorted = state.players.map((p, i) => ({ name: p.name, pts: res.roundScores[i] || 0, total: p.score }))
    .sort((a, b) => b.pts - a.pts);
  sorted.forEach(e => {
    html += `<div class="score-row">
      <span class="name">${e.name}</span>
      <span class="points ${e.pts === 0 ? 'zero' : ''}">+${e.pts} (${e.total})</span>
    </div>`;
  });
  html += `</div>`;

  if (isGameOver) {
    html += `<button class="btn mt-12" onclick="showTitle()">На главную</button>`;
  } else if (NET.isHost) {
    html += `<button class="btn mt-12" onclick="hostNextRound()">Следующий раунд</button>`;
  } else {
    html += `<div class="waiting-msg" style="font-size:14px;margin-top:12px;">Ожидание хоста<span class="waiting-dots">...</span></div>`;
  }

  body.innerHTML = html;
}

// ============================================================
// HOST PLAYER ACTIONS (idx 0)
// ============================================================
// Host actions go through the same hostOn* functions but we
// need to handle the case where conn is null (local player).
// We already handle this — hostOnMessage checks for _fromHost
// but actually the direct calls from doSubmitClue etc. bypass it.
// The direct calls in doSubmitClue/doSubmitContribute/doSubmitVote
// already call hostOnStoryteller/etc. directly for host. Good.

// ============================================================
showTitle();
</script>
