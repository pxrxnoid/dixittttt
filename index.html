<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>XAxit — Игра ассоциаций</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0d1117;
  --bg-card: #161b22;
  --bg-surface: #1c2333;
  --gold: #e8a83e;
  --gold-dim: #b8862e;
  --gold-glow: rgba(232, 168, 62, 0.3);
  --amber: #f0c060;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #484f58;
  --accent-blue: #58a6ff;
  --accent-purple: #bc8cff;
  --accent-rose: #f78166;
  --success: #56d364;
  --danger: #f85149;
  --card-w: 130px;
  --card-h: 182px;
  --radius: 12px;
  --transition: 0.3s ease;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

h1, h2, h3 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
}

button {
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  border: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

input {
  font-family: 'Inter', sans-serif;
  outline: none;
}

/* ============================================================
   APP CONTAINER & SCREENS
   ============================================================ */
#app {
  width: 100%; height: 100%;
  position: relative;
  overflow: hidden;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  overflow-y: auto;
  background: radial-gradient(ellipse at 50% 40%, #1a2340 0%, var(--bg-deep) 70%);
}
.screen.active {
  opacity: 1;
  pointer-events: auto;
}

/* ============================================================
   SHARED UI
   ============================================================ */
.btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-dim));
  color: var(--bg-deep);
  font-weight: 600;
  font-size: 16px;
  padding: 14px 36px;
  border-radius: 50px;
  letter-spacing: 0.5px;
  transition: transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 20px var(--gold-glow);
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.4; pointer-events: none; }
.btn--secondary {
  background: var(--bg-surface);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border: 1px solid var(--text-muted);
}
.btn--small { font-size: 14px; padding: 10px 24px; }

.phase-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 8px;
}

.clue-display {
  font-family: 'Inter', sans-serif;
  font-style: italic;
  font-weight: 500;
  font-size: 22px;
  color: var(--amber);
  text-align: center;
  margin: 12px 0;
  padding: 12px 24px;
  border-left: 3px solid var(--gold-dim);
  max-width: 400px;
  word-break: break-word;
}
.clue-display img.clue-gif {
  max-width: 200px;
  max-height: 150px;
  border-radius: 8px;
}
.gif-btn {
  background: none;
  border: 1px solid var(--text-muted);
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  white-space: nowrap;
}
.gif-btn:hover { border-color: var(--gold); color: var(--gold); }
.gif-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.gif-modal-overlay.open { display: flex; }
.gif-modal {
  background: var(--bg-surface);
  border-radius: 12px;
  padding: 16px;
  width: min(420px, 92vw);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.gif-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.gif-modal-header span { color: var(--gold); font-weight: 600; font-size: 15px; }
.gif-modal-close {
  background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer;
}
.gif-search-row {
  display: flex;
  gap: 6px;
}
.gif-search-row input { flex: 1; }
.gif-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--text-muted) transparent;
}
.gif-grid img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.gif-grid img:hover { border-color: var(--gold); }
.gif-load-more {
  text-align: center;
  padding: 8px;
}
.gif-load-more button {
  background: none; border: 1px solid var(--text-muted); color: var(--text-dim);
  padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
.gif-preview {
  display: none;
  align-items: center;
  gap: 8px;
}
.gif-preview.visible { display: flex; }
.gif-preview img {
  max-width: 120px;
  max-height: 80px;
  border-radius: 6px;
  border: 1px solid var(--gold);
}
.gif-preview .gif-remove {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
}

.input-field {
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 15px;
  transition: border-color var(--transition);
  width: 100%;
  max-width: 300px;
}
.input-field:focus { border-color: var(--gold); }

.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.gap-20 { gap: 20px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mt-12 { margin-top: 12px; }
.text-center { text-align: center; }
.text-dim { color: var(--text-dim); }
.text-small { font-size: 13px; }
.text-gold { color: var(--gold); }

/* ============================================================
   TITLE SCREEN
   ============================================================ */
.title-logo {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--amber), #f4d896);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  text-align: center;
}
.title-sub {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--text-dim);
  margin-bottom: 48px;
}
.title-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.title-particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-100vh) scale(1); }
}
.title-buttons {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

/* ============================================================
   LOBBY SCREEN
   ============================================================ */
.room-code-box {
  background: var(--bg-surface);
  border: 2px dashed var(--gold-dim);
  border-radius: 16px;
  padding: 16px 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition);
  position: relative;
}
.room-code-box:active { border-color: var(--gold); }
.room-code-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.room-code {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 8px;
}
.room-code-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}
.copied-toast {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--success);
  color: var(--bg-deep);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.3s;
}
.copied-toast.show { opacity: 1; }

.player-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 300px;
}
.player-list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--bg-surface);
  border-radius: 10px;
  font-size: 15px;
}
.player-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}
.player-list-item .host-badge {
  font-size: 10px;
  color: var(--gold);
  margin-left: auto;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.player-list-item .bot-badge {
  font-size: 12px;
  margin-left: auto;
}
.player-list-item .bot-badge + .host-badge {
  margin-left: 4px;
}
.remove-bot-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  padding: 2px 4px;
  margin-left: 4px;
  transition: color 0.2s;
}
.remove-bot-btn:hover { color: #e74c3c; }
.btn-sm {
  font-size: 13px;
  padding: 8px 16px;
}

/* Score switch */
.score-switch {
  display: flex;
  gap: 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--text-muted);
}
.score-option {
  padding: 10px 20px;
  background: var(--bg-surface);
  color: var(--text-dim);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
}
.score-option.active {
  background: var(--gold);
  color: var(--bg-deep);
}

/* ============================================================
   GAME SCREEN
   ============================================================ */
#game-screen {
  justify-content: flex-start;
  padding-top: 0;
  padding-bottom: 16px;
}
@media (max-width: 480px) {
  #game-screen {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #game-screen .game-body {
    flex: none;
    overflow: visible;
  }
  #game-screen #my-hand-area {
    flex: none;
  }
}

.game-header {
  width: 100%;
  display: flex;
  align-items: center;
  padding: 10px 16px;
  background: rgba(0,0,0,0.3);
  flex-shrink: 0;
  gap: 12px;
  flex-wrap: wrap;
}
.gh-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  flex-shrink: 0;
}
.gh-left .round-info { color: var(--text-dim); }
.gh-left .round-info b { color: var(--gold); font-weight: 600; }
.gh-left .st-name { color: var(--accent-purple); font-weight: 500; }
.gh-timer-wrap {
  flex: 1;
  min-width: 60px;
  display: flex;
  align-items: center;
}
.gh-timer-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.gh-timer-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 1s linear;
}
.gh-timer-fill.low { background: var(--danger); }
.end-game-btn {
  background: rgba(248,81,73,0.15);
  border: 1px solid var(--danger);
  color: var(--danger);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.2s;
}
.end-game-btn:hover { background: rgba(248,81,73,0.3); }
@media (max-width: 480px) {
  .gh-timer-wrap {
    order: 10;
    flex-basis: 100%;
    margin-top: -4px;
  }
}

/* Scoreboard (floating bottom-right) */
.scores-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 100;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  color: var(--gold);
  font-size: 18px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.scores-toggle.visible { display: flex; }
.scores-toggle.hidden { opacity: 0; pointer-events: none; transform: scale(0.5); }

.scores-panel {
  position: fixed;
  bottom: 16px; right: 16px;
  width: 200px;
  max-height: 280px;
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  border-radius: 12px;
  z-index: 99;
  transform: translateX(calc(100% + 32px));
  transition: transform 0.3s ease;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.scores-panel.open { transform: translateX(0); }
.scores-panel-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  color: var(--gold);
  margin-bottom: 4px;
}
.scores-panel-close {
  position: absolute;
  top: 8px; right: 10px;
  background: none;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
}
.sp-entry {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  font-size: 13px;
}
.sp-entry.storyteller { border-left: 3px solid var(--gold); }
.sp-entry .sp-name { font-weight: 500; }
.sp-entry .sp-pts { color: var(--accent-blue); font-weight: 600; }
.sp-entry.storyteller .sp-name { color: var(--gold); }

/* Desktop: always show scores panel during game, hide toggle */
@media (min-width: 769px) {
  .scores-toggle.visible { display: none !important; }
  .scores-panel-close { display: none; }
}

/* Round log panel */
.log-toggle {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 100;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  color: var(--text-dim);
  font-size: 16px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.log-toggle.visible { display: flex; }
.log-toggle.hidden { opacity: 0; pointer-events: none; transform: scale(0.5); }

.log-panel {
  position: fixed;
  bottom: 16px; left: 16px;
  width: 220px;
  max-height: 300px;
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  border-radius: 12px;
  z-index: 99;
  transform: translateX(calc(-100% - 32px));
  transition: transform 0.3s ease;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.log-panel.open { transform: translateX(0); }
.log-panel-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 4px;
}
.log-panel-close {
  position: absolute;
  top: 8px; right: 10px;
  background: none;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  border: none;
}
.log-entries {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--text-muted) transparent;
}
.log-round {
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  padding: 6px 8px;
  font-size: 12px;
}
.log-round-header {
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 2px;
  display: flex;
  justify-content: space-between;
}
.log-round-clue {
  color: var(--text-muted);
  font-style: italic;
  font-size: 11px;
  margin-bottom: 2px;
}
.log-score-line {
  display: flex;
  justify-content: space-between;
  color: var(--text-dim);
}
.log-score-line .pts { color: var(--success); font-weight: 600; }
.log-score-line .pts.zero { color: var(--text-muted); }

@media (min-width: 769px) {
  .log-toggle.visible { display: none !important; }
  .log-panel-close { display: none; }
}
@media (max-width: 768px) {
  .log-panel { width: 200px; max-height: 260px; }
}

/* Game body */
.game-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  width: 100%;
  overflow-y: auto;
  padding: 12px 0;
}

/* Waiting state */
.waiting-msg {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--text-dim);
  text-align: center;
  max-width: 320px;
}
.waiting-progress {
  font-size: 14px;
  color: var(--text-muted);
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.waiting-dots {
  animation: pulse 1.5s ease-in-out infinite;
}

/* Clue input */
.clue-input-area {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 400px;
  align-items: center;
}
.clue-input-area input {
  flex: 1;
}

/* Cards */
.hand-area {
  display: flex;
  gap: 10px;
  padding: 12px 8px;
  overflow-x: auto;
  max-width: 100%;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--text-muted) transparent;
  justify-content: center;
  flex-wrap: wrap;
}

.card-container {
  width: var(--card-w);
  min-width: var(--card-w);
  height: var(--card-h);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
  border: 2px solid var(--text-muted);
  cursor: pointer;
  transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  position: relative;
  flex-shrink: 0;
}
@media (hover: hover) {
  .card-container.selectable:hover {
    transform: translateY(-6px);
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
  }
}
.card-container:active { transform: scale(0.97); }
.card-container.selected {
  border-color: var(--gold);
  box-shadow: 0 0 16px var(--gold-glow), 0 8px 24px rgba(0,0,0,0.4);
  transform: translateY(-6px);
}
.card-container.disabled { opacity: 0.35; pointer-events: none; }
.card-container.storyteller-card {
  box-shadow: 0 0 20px var(--gold-glow), 0 0 40px var(--gold-glow);
  border: 2px solid var(--gold);
}
.card-container img {
  width: 100%; height: 100%;
  display: block;
  object-fit: cover;
}
.card-number {
  position: absolute;
  bottom: 4px; right: 6px;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  font-weight: 600;
  pointer-events: none;
}

/* Voting grid */
.voting-grid {
  display: flex;
  flex-wrap: nowrap;
  gap: 14px;
  justify-content: center;
  max-width: 90vw;
  overflow: visible;
}
.voting-grid .card-container {
  width: 110px; min-width: 110px; height: 154px;
}

/* Results */
.results-cards-area {
  display: flex;
  flex-wrap: nowrap;
  gap: 16px;
  justify-content: center;
  max-width: 90vw;
  overflow-x: auto;
}
.result-card-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.result-card-wrapper .owner-label {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
}
.result-card-wrapper .owner-label.storyteller {
  color: var(--gold);
  font-weight: 600;
}
.result-card-wrapper .votes-list {
  font-size: 11px;
  color: var(--accent-blue);
  text-align: center;
}
.score-changes {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
  max-width: 360px;
}
.score-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-surface);
  border-radius: 8px;
}
.score-row .name { font-weight: 500; }
.score-row .points { color: var(--success); font-weight: 600; }
.score-row .points.zero { color: var(--text-muted); }

/* Game over */
.game-over-banner {
  font-family: 'Inter', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--amber);
  text-align: center;
  margin-bottom: 4px;
}
.game-over-sub {
  font-size: 14px;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 16px;
}
.leaderboard {
  width: 100%;
  max-width: 360px;
  margin: 0 auto 16px;
}
.lb-entry {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-radius: 10px;
  margin-bottom: 6px;
  background: var(--bg-surface);
}
.lb-entry.gold { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05)); border: 1px solid rgba(255,215,0,0.3); }
.lb-entry.silver { background: linear-gradient(135deg, rgba(192,192,192,0.12), rgba(192,192,192,0.04)); border: 1px solid rgba(192,192,192,0.2); }
.lb-entry.bronze { background: linear-gradient(135deg, rgba(205,127,50,0.12), rgba(205,127,50,0.04)); border: 1px solid rgba(205,127,50,0.2); }
.lb-place {
  font-size: 22px;
  width: 36px;
  text-align: center;
  flex-shrink: 0;
}
.lb-name {
  flex: 1;
  font-weight: 600;
  font-size: 16px;
}
.lb-score {
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
}

/* Status toast */
.status-bar {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-surface);
  color: var(--text-dim);
  text-align: center;
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 400;
  z-index: 200;
  border-radius: 20px;
  border: 1px solid var(--text-muted);
  opacity: 0;
  transition: transform 0.3s, opacity 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
.status-bar.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ============================================================
   ADMIN PANEL
   ============================================================ */
.admin-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 10;
  padding: 6px 14px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--text-muted);
  color: var(--text-muted);
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all var(--transition);
}
.admin-btn:hover { color: var(--text-dim); border-color: var(--text-dim); }

.admin-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.admin-overlay.open { display: flex; }

.admin-modal {
  background: var(--bg-card);
  border: 1px solid var(--text-muted);
  border-radius: 16px;
  width: 100%;
  max-width: 700px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--text-muted);
  flex-shrink: 0;
}
.admin-header h2 {
  font-size: 20px;
  color: var(--gold);
}
.admin-close {
  background: none;
  color: var(--text-dim);
  font-size: 24px;
  cursor: pointer;
}
.admin-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
}
.admin-password-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 32px 0;
}
.admin-upload-area {
  border: 2px dashed var(--text-muted);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
  cursor: pointer;
  transition: border-color var(--transition);
}
.admin-upload-area:hover { border-color: var(--gold); }
.admin-upload-area input { display: none; }
.admin-upload-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
}
.admin-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px;
}
.admin-gallery-item {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 5/7;
  background: var(--bg-surface);
}
.admin-gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.admin-gallery-item .delete-btn {
  position: absolute;
  top: 4px; right: 4px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: var(--danger);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.admin-gallery-item:hover .delete-btn { opacity: 1; }
@media (max-width: 768px) {
  .admin-gallery-item .delete-btn { opacity: 0.85; }
}
.admin-gallery-item .img-badge {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.6);
  color: var(--text-dim);
  font-size: 10px;
  padding: 2px 6px;
  text-align: center;
}
.admin-count {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

/* ============================================================
   CROP MODAL
   ============================================================ */
.crop-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 400;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 16px;
}
.crop-overlay.open { display: flex; }
.crop-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--gold);
}
.crop-container {
  width: min(280px, 75vw);
  aspect-ratio: 5/7;
  position: relative;
  overflow: hidden;
  border: 2px solid var(--gold);
  border-radius: 12px;
  background: #000;
  touch-action: none;
}
.crop-container img {
  position: absolute;
  cursor: grab;
  user-select: none;
  pointer-events: none;
}
.crop-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-dim);
  font-size: 13px;
}
.crop-slider {
  width: 180px;
  accent-color: var(--gold);
}
.crop-buttons {
  display: flex;
  gap: 12px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 480px) {
  .title-logo { font-size: 44px; }
  .title-sub { font-size: 15px; }
  .room-code { font-size: 36px; }
  :root { --card-w: 68px; --card-h: 95px; }
  .voting-grid { flex-wrap: wrap; max-width: 100%; overflow: visible; }
  .voting-grid .card-container { width: 80px; min-width: 80px; height: 112px; }
  .results-cards-area { flex-wrap: wrap; max-width: 100%; }
  .clue-display { font-size: 18px; margin: 6px 0; padding: 8px 16px; }
  .clue-display img.clue-gif { max-width: 140px; max-height: 100px; }
  .hand-area { gap: 6px; padding: 6px 6px; flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; }
  #my-hand-area { padding: 6px 0 2px !important; }
  .game-body { gap: 6px; padding: 6px 0; }
  .phase-label { font-size: 11px; }
  .waiting-msg { font-size: 16px; }
}
@media (max-width: 360px) {
  :root { --card-w: 58px; --card-h: 81px; }
  .voting-grid .card-container { width: 70px; min-width: 70px; height: 98px; }
}

/* ============================================================
   TIMER TOGGLES
   ============================================================ */
.timer-toggles {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 300px;
}
.toggle-row {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  padding: 10px 14px;
  background: var(--bg-surface);
  border-radius: 10px;
  border: 1px solid var(--text-muted);
  transition: border-color var(--transition);
}
.toggle-row:hover { border-color: var(--gold-dim); }
.toggle-row input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 42px;
  height: 24px;
  background: var(--bg-deep);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
  flex-shrink: 0;
}
.toggle-row input[type="checkbox"]::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  background: var(--text-muted);
  border-radius: 50%;
  transition: transform 0.3s, background 0.3s;
}
.toggle-row input[type="checkbox"]:checked {
  background: var(--gold-dim);
}
.toggle-row input[type="checkbox"]:checked::after {
  transform: translateX(18px);
  background: var(--gold);
}
.toggle-label {
  font-size: 14px;
  color: var(--text-dim);
  user-select: none;
}

/* ============================================================
   ENHANCED CARD ANIMATIONS
   ============================================================ */
.card-container {
  transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, opacity 0.3s ease;
}
.card-container.selectable {
  cursor: pointer;
}
.card-container.selected {
  border-color: var(--gold);
  box-shadow: 0 0 20px var(--gold-glow), 0 0 40px rgba(232,168,62,0.15), 0 8px 24px rgba(0,0,0,0.4);
  transform: translateY(-8px) scale(1.03);
}

/* Phase label glow */
.phase-label {
  text-shadow: 0 0 20px rgba(232,168,62,0.3);
}

/* Better button hover states */
.btn {
  transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
}
@media (hover: hover) {
  .btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px var(--gold-glow);
    filter: brightness(1.1);
  }
  .btn--secondary:hover:not(:disabled) {
    border-color: var(--text-dim);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
}

/* Smooth screen transitions */
.screen {
  transition: opacity 0.4s ease;
}

/* Game over confetti-like decoration */
.game-over-banner {
  text-shadow: 0 0 30px rgba(240,192,96,0.4);
  animation: winnerPulse 2s ease-in-out infinite;
}
@keyframes winnerPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

/* Result card hover */
@media (hover: hover) {
  .result-card-wrapper:hover .card-container {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
}

/* Lobby player list entrance animation */
.player-list-item {
  animation: slideIn 0.3s ease-out;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Score row highlight for points */
.score-row .points:not(.zero) {
  text-shadow: 0 0 8px rgba(86,211,100,0.3);
}

/* Leaderboard entry subtle hover */
@media (hover: hover) {
  .lb-entry:hover {
    transform: translateX(4px);
    transition: transform 0.2s ease;
  }
}

/* Clue display decoration */
.clue-display {
  background: rgba(232,168,62,0.05);
  border-radius: 8px;
}

/* Voting grid card hover */
@media (hover: hover) {
  .voting-grid .card-container.selectable:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    border-color: var(--gold-dim);
  }
}

/* Status bar improvement */
.status-bar {
  backdrop-filter: blur(8px);
  background: rgba(28,35,51,0.9);
}

/* Waiting dots animation improvement */
.waiting-msg {
  line-height: 1.6;
}

/* Room code box hover */
@media (hover: hover) {
  .room-code-box:hover {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(232,168,62,0.1);
  }
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }
</style>
</head>
<body>

<div id="app">
  <!-- TITLE -->
  <div id="title-screen" class="screen active">
    <div class="title-particles" id="title-particles"></div>
    <button class="admin-btn" onclick="openAdmin()">Картинки</button>
    <img src="logo.png" alt="XAxit" style="max-width:380px;max-height:180px;margin-bottom:16px;width:80%;">
    <div class="title-buttons">
      <button class="btn" onclick="showCreate()">Создать игру</button>
      <button class="btn btn--secondary" onclick="showJoin()">Присоединиться</button>
    </div>
  </div>

  <!-- CREATE GAME -->
  <div id="create-screen" class="screen">
    <h2 style="font-size:24px;color:var(--gold);margin-bottom:16px;">Создать игру</h2>
    <input class="input-field mb-16" id="create-name" type="text" placeholder="Твой никнейм" maxlength="20" autocomplete="off">
    <p class="text-dim text-small mb-8">Играть до:</p>
    <div class="score-switch mb-16">
      <button class="score-option active" data-score="32" onclick="pickScore(this)">32</button>
      <button class="score-option" data-score="54" onclick="pickScore(this)">54</button>
      <button class="score-option" data-score="67" onclick="pickScore(this)">67</button>
      <input class="score-option" id="custom-score" type="number" min="1" max="999" placeholder="своё" style="width:72px;text-align:center;border:1px solid var(--text-muted);border-radius:8px;font-size:16px;padding:4px 8px;background:var(--bg);color:var(--text);" onfocus="pickCustomScore()" oninput="pickCustomScore()">
    </div>
    <div class="timer-toggles mb-16">
      <label class="toggle-row">
        <input type="checkbox" id="toggle-st-timer" checked>
        <span class="toggle-label">Таймер рассказчика (60 сек)</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="toggle-act-timer" checked>
        <span class="toggle-label">Таймер блеф/голосование (30 сек)</span>
      </label>
    </div>
    <button class="btn" id="create-btn" onclick="doCreate()">Создать</button>
    <button class="btn btn--secondary btn--small mt-12" onclick="showTitle()">Назад</button>
    <p id="create-status" class="text-dim text-small mt-12" style="display:none;"></p>
  </div>

  <!-- JOIN GAME -->
  <div id="join-screen" class="screen">
    <h2 style="font-size:24px;color:var(--gold);margin-bottom:16px;">Присоединиться</h2>
    <input class="input-field mb-16" id="join-name" type="text" placeholder="Твой никнейм" maxlength="20" autocomplete="off">
    <input class="input-field mb-16" id="join-code" type="text" placeholder="Код комнаты" maxlength="4" autocomplete="off" style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:20px;">
    <button class="btn" id="join-btn" onclick="doJoin()">Войти</button>
    <button class="btn btn--secondary btn--small mt-12" onclick="showTitle()">Назад</button>
    <p id="join-status" class="text-dim text-small mt-12" style="display:none;"></p>
  </div>

  <!-- LOBBY -->
  <div id="lobby-screen" class="screen">
    <div class="room-code-box" id="room-code-box" onclick="copyCode()">
      <div class="room-code-label">Код комнаты</div>
      <div class="room-code" id="lobby-code"></div>
      <div class="room-code-hint">нажми чтобы скопировать</div>
      <div class="copied-toast" id="copied-toast">Скопировано!</div>
    </div>
    <p class="text-dim text-small mt-12 mb-8">Игроки:</p>
    <div class="player-list" id="lobby-players"></div>
    <p class="text-dim text-small mt-12" id="lobby-score-label"></p>
    <button class="btn btn-sm mt-12" id="lobby-add-bot" onclick="addBot()" style="display:none;">🤖 Добавить бота</button>
    <button class="btn mt-12" id="lobby-start-btn" onclick="doStartGame()" style="display:none;">Начать игру</button>
    <p class="text-dim text-small mt-12" id="lobby-wait" style="display:none;">Ожидание хоста...</p>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <div class="gh-left">
        <span class="round-info">Раунд <b id="gh-round">1</b></span>
        <span class="st-name" id="gh-st-name"></span>
      </div>
      <div class="gh-timer-wrap" id="gh-timer-wrap" style="display:none;">
        <div class="gh-timer-bar"><div class="gh-timer-fill" id="gh-timer-fill"></div></div>
      </div>
      <button class="end-game-btn" id="end-game-btn" onclick="doEndGame()" style="display:none;">Завершить</button>
    </div>
    <div class="game-body" id="game-body"></div>
    <div id="my-hand-area" style="width:100%;flex-shrink:0;border-top:1px solid var(--text-muted);padding:12px 0 4px;">
      <div class="hand-area" id="my-hand" style="justify-content:center;overflow:visible;"></div>
    </div>
  </div>
</div>

<!-- Floating scores toggle -->
<button class="scores-toggle" id="scores-toggle" onclick="toggleScores()">★</button>
<div class="scores-panel" id="scores-panel">
  <button class="scores-panel-close" onclick="toggleScores()">&times;</button>
  <div class="scores-panel-title">Очки</div>
  <div id="scores-list"></div>
</div>

<!-- Round log panel -->
<button class="log-toggle" id="log-toggle" onclick="toggleLog()">📋</button>
<div class="log-panel" id="log-panel">
  <button class="log-panel-close" onclick="toggleLog()">&times;</button>
  <div class="log-panel-title">История</div>
  <div class="log-entries" id="log-entries"></div>
</div>

<!-- GIF picker modal -->
<div class="gif-modal-overlay" id="gif-modal" onclick="if(event.target===this)closeGifModal()">
  <div class="gif-modal">
    <div class="gif-modal-header">
      <span>Выбери GIF</span>
      <button class="gif-modal-close" onclick="closeGifModal()">&times;</button>
    </div>
    <div class="gif-search-row">
      <input class="input-field" id="gif-search" type="text" placeholder="Поиск GIF…" autocomplete="off">
      <button class="btn btn--small" onclick="searchGifs()">🔍</button>
    </div>
    <div class="gif-grid" id="gif-grid"></div>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar" id="status-bar"></div>

<!-- Crop modal -->
<div class="crop-overlay" id="crop-overlay">
  <div class="crop-title">Обрезка изображения</div>
  <div class="crop-container" id="crop-container"></div>
  <div class="crop-controls">
    <span>−</span>
    <input type="range" class="crop-slider" id="crop-zoom" min="1" max="3" step="0.01" value="1" oninput="cropZoom(this.value)">
    <span>+</span>
  </div>
  <div class="crop-buttons">
    <button class="btn btn--secondary btn--small" onclick="closeCropModal()">Отмена</button>
    <button class="btn btn--small" onclick="cropSave()">Сохранить</button>
  </div>
</div>

<!-- Admin overlay -->
<div class="admin-overlay" id="admin-overlay">
  <div class="admin-modal">
    <div class="admin-header">
      <h2 id="admin-title">Управление картинками</h2>
      <button class="admin-close" onclick="closeAdmin()">&times;</button>
    </div>
    <div class="admin-body" id="admin-body">
      <!-- Filled dynamically -->
    </div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const DEFAULT_IMAGES = [
  '1E8B0269-6F4A-455E-8E32-D92A80529A71.JPG',
  '4A06414C-606A-4326-B9AF-F92E56E52264 (1).JPG',
  '85D134AB-4E4B-47BE-AB7F-36E0E29F8533.PNG',
  'B21DBD94-BA39-463A-A9CB-2D0B5E08CACB.JPG',
  'DF91EC43-7970-485D-B1C5-4FFDF61A77A2 (1).PNG',
  'IMG_6773.JPG',
  'IMG_6944.JPG',
  'IMG_7085.JPG'
];
let IMAGE_FILES = [...DEFAULT_IMAGES];
const ADMIN_PASSWORD = 'maslo54';

// ============================================================
// STATE
// ============================================================
const NET = {
  socket: null,
  roomCode: '',
  myName: '',
  myIdx: -1,
  isCreator: false,
  intentionalDisconnect: false,
};

let localState = null;
let selectedCard = null;
let serverImageUrls = []; // URLs like /img/ABCD/0, filled after upload or join

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const toggle = document.getElementById('scores-toggle');
  const panel = document.getElementById('scores-panel');
  const logToggle = document.getElementById('log-toggle');
  const logPanel = document.getElementById('log-panel');
  if (id === 'game-screen') {
    toggle.classList.add('visible');
    logToggle.classList.add('visible');
    if (window.innerWidth > 768) {
      panel.classList.add('open');
      logPanel.classList.add('open');
    }
  } else {
    toggle.classList.remove('visible');
    panel.classList.remove('open');
    logToggle.classList.remove('visible');
    logPanel.classList.remove('open');
  }
}

function clearSession() {
  sessionStorage.removeItem('xaxit-session');
  history.replaceState(null, '', '/');
}

function saveSession() {
  sessionStorage.setItem('xaxit-session', JSON.stringify({
    roomCode: NET.roomCode,
    playerName: NET.myName,
  }));
}

function showTitle() {
  NET.intentionalDisconnect = true;
  clearSession();
  if (NET.socket) { NET.socket.close(); NET.socket = null; }
  serverImageUrls = [];
  showScreen('title-screen');
  history.pushState({ screen: 'title' }, '', '/');
}

function showCreate() { showScreen('create-screen'); }
function showJoin() { showScreen('join-screen'); }

// SCORE SWITCH

function pickScore(el) {
  document.querySelectorAll('.score-option').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('custom-score').value = '';
}
function pickCustomScore() {
  document.querySelectorAll('.score-option').forEach(b => b.classList.remove('active'));
  document.getElementById('custom-score').classList.add('active');
}
function getSelectedScore() {
  const customInput = document.getElementById('custom-score');
  if (customInput.classList.contains('active') && customInput.value) {
    return Math.max(1, parseInt(customInput.value) || 32);
  }
  const active = document.querySelector('button.score-option.active');
  return active ? parseInt(active.dataset.score) : 32;
}

function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function createCardElement(cardId, opts = {}) {
  const div = document.createElement('div');
  div.className = 'card-container';
  if (opts.disabled) div.classList.add('disabled');
  if (opts.storyteller) div.classList.add('storyteller-card');
  div.dataset.cardId = cardId;
  const img = document.createElement('img');
  // cardId is like "card_3" → index 3
  const idx = parseInt(cardId.split('_')[1]);
  img.src = serverImageUrls[idx] || IMAGE_FILES[idx];
  img.draggable = false;
  div.appendChild(img);
  if (opts.label) {
    const lbl = document.createElement('span');
    lbl.className = 'card-number';
    lbl.textContent = opts.label;
    div.appendChild(lbl);
  }
  return div;
}

function updateLogPanel(state) {
  const log = state.roundLog;
  if (!log || log.length === 0) return;
  const container = document.getElementById('log-entries');
  container.innerHTML = '';
  log.forEach(entry => {
    let html = `<div class="log-round">`;
    html += `<div class="log-round-header"><span>Раунд ${entry.round}</span></div>`;
    if (entry.clue) {
      if (entry.clue.startsWith('gif:')) {
        html += `<div class="log-round-clue"><img src="${entry.clue.slice(4)}" style="max-width:60px;max-height:40px;border-radius:4px;"></div>`;
      } else {
        html += `<div class="log-round-clue">"${entry.clue}"</div>`;
      }
    }
    entry.scores.forEach(s => {
      html += `<div class="log-score-line"><span>${s.name}</span><span class="pts${s.pts === 0 ? ' zero' : ''}">+${s.pts}</span></div>`;
    });
    html += `</div>`;
    container.innerHTML += html;
  });
  container.scrollTop = container.scrollHeight;
}

// ============================================================
// WEBSOCKET CONNECTION
// ============================================================
function connectToRoom(roomCode, onOpen) {
  NET.intentionalDisconnect = false;
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws/${roomCode}`);
  NET.socket = ws;
  NET.roomCode = roomCode;

  ws.onopen = () => { if (onOpen) onOpen(); };
  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }
    onServerMessage(data);
  };
  ws.onclose = () => {
    if (NET.intentionalDisconnect) return;
    const s = sessionStorage.getItem('xaxit-session');
    if (s) {
      setTimeout(() => {
        if (NET.intentionalDisconnect) return;
        const { roomCode: rc, playerName } = JSON.parse(s);
        if (rc) connectToRoom(rc, () => {
          NET.socket.send(JSON.stringify({ type: 'rejoin', name: playerName }));
        });
      }, 1500);
    }
  };
  ws.onerror = () => {};
}

// Browser back/forward navigation
window.addEventListener('popstate', (e) => {
  if (!e.state || e.state.screen === 'title') {
    NET.intentionalDisconnect = true;
    sessionStorage.removeItem('xaxit-session');
    if (NET.socket) { NET.socket.close(); NET.socket = null; }
    serverImageUrls = [];
    showScreen('title-screen');
  }
});

function sendMsg(msg) {
  if (NET.socket && NET.socket.readyState === WebSocket.OPEN) {
    NET.socket.send(JSON.stringify(msg));
  }
}

async function doCreate() {
  const name = document.getElementById('create-name').value.trim();
  if (!name) return;
  const status = document.getElementById('create-status');
  status.style.display = 'block';
  status.textContent = 'Загрузка картинок...';
  document.getElementById('create-btn').disabled = true;

  NET.myName = name;
  NET.isCreator = true;
  const code = genRoomCode();

  // Upload images to server via HTTP
  try {
    const formData = new FormData();
    for (let i = 0; i < IMAGE_FILES.length; i++) {
      const src = IMAGE_FILES[i];
      let blob;
      if (src.startsWith('data:')) {
        const res = await fetch(src);
        blob = await res.blob();
      } else {
        const res = await fetch(src);
        blob = await res.blob();
      }
      formData.append('images', blob, 'img_' + i + '.jpg');
    }
    const resp = await fetch('/upload/' + code, { method: 'POST', body: formData });
    const data = await resp.json();
    serverImageUrls = data.urls;
  } catch (e) {
    status.textContent = 'Ошибка загрузки картинок';
    document.getElementById('create-btn').disabled = false;
    return;
  }

  // Read timer settings
  const stTimerOn = document.getElementById('toggle-st-timer')?.checked ?? true;
  const actTimerOn = document.getElementById('toggle-act-timer')?.checked ?? true;

  status.textContent = 'Подключение...';
  connectToRoom(code, () => {
    sendMsg({
      type: 'create', name, winScore: getSelectedScore(),
      imageCount: serverImageUrls.length,
      settings: { storytellerTimer: stTimerOn, actionTimer: actTimerOn }
    });
    status.style.display = 'none';
    document.getElementById('create-btn').disabled = false;
  });
}

function doJoin() {
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name || code.length !== 4) return;

  const status = document.getElementById('join-status');
  status.style.display = 'block';
  status.textContent = 'Подключение...';
  document.getElementById('join-btn').disabled = true;

  NET.myName = name;
  NET.isCreator = false;

  connectToRoom(code, () => {
    sendMsg({ type: 'join', name });
  });
}

// ============================================================
// SERVER MESSAGE HANDLING
// ============================================================
function onServerMessage(data) {
  if (data.type === 'joined') {
    NET.myIdx = data.playerIdx;
    NET.isCreator = data.playerIdx === 0;
    history.replaceState({screen:'room', room: NET.roomCode}, '', '/room/' + NET.roomCode);
    saveSession();
    return;
  }
  if (data.type === 'rejoined') {
    NET.myIdx = data.playerIdx;
    NET.isCreator = data.playerIdx === 0;
    saveSession();
    return;
  }
  if (data.type === 'lobby') {
    localState = data;
    if (data.imageCount) serverImageUrls = Array.from({length: data.imageCount}, (_, i) => '/img/' + data.roomCode + '/' + i);
    document.getElementById('lobby-code').textContent = data.roomCode;
    document.getElementById('join-status').style.display = 'none';
    document.getElementById('join-btn').disabled = false;
    updateLobbyUI();
    showScreen('lobby-screen');
    return;
  }
  if (data.type === 'state') {
    const prev = localState;
    localState = data;
    if (data.isCreator !== undefined) NET.isCreator = data.isCreator;
    saveSession();
    // Skip full re-render if phase/round/counts haven't changed (avoids deselecting cards)
    if (prev && prev.type === 'state' && prev.phase === data.phase && prev.round === data.round
        && prev.contributedCount === data.contributedCount && prev.votedCount === data.votedCount
        && prev.alreadyContributed === data.alreadyContributed && prev.alreadyVoted === data.alreadyVoted) {
      updateScoresPanel(data);
      updateLogPanel(data);
      updateTimer(data);
      return;
    }
    renderGame(data);
    return;
  }
  if (data.type === 'error') {
    showStatus(data.msg);
    return;
  }
}

// ============================================================
// GAME RENDERING
// ============================================================
function doEndGame() {
  if (!confirm('Завершить игру?')) return;
  sendMsg({ type: 'endGame' });
}

function updateTimer(state) {
  const wrap = document.getElementById('gh-timer-wrap');
  const fill = document.getElementById('gh-timer-fill');
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (state.timerRemaining != null && state.timerTotal) {
    wrap.style.display = '';
    const endTime = Date.now() + state.timerRemaining;
    const total = state.timerTotal;
    const tick = () => {
      const left = Math.max(0, endTime - Date.now());
      const pct = (left / total) * 100;
      fill.style.width = pct + '%';
      fill.classList.toggle('low', pct < 25);
      if (left <= 0 && timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    };
    tick();
    timerInterval = setInterval(tick, 500);
  } else {
    wrap.style.display = 'none';
    fill.style.width = '100%';
  }
}

let timerInterval = null;

function renderGame(state) {
  if (!state || state.type !== 'state') return;
  showScreen('game-screen');

  document.getElementById('gh-round').textContent = state.round;
  document.getElementById('gh-st-name').textContent = state.storytellerName || '';
  document.getElementById('end-game-btn').style.display = NET.isCreator ? 'inline-block' : 'none';
  updateScoresPanel(state);
  updateTimer(state);

  const body = document.getElementById('game-body');
  body.innerHTML = '';
  handIsSelectable = false;

  switch (state.phase) {
    case 'storyteller': renderStoryteller(body, state); break;
    case 'contribute': renderContribute(body, state); break;
    case 'vote': renderVote(body, state); break;
    case 'results': renderResults(body, state); break;
  }

  // Always render hand at the bottom (unless makeHandSelectable already set it up)
  if (!handIsSelectable) {
    renderMyHand(state);
  }
  updateLogPanel(state);
}

function renderMyHand(state) {
  const container = document.getElementById('my-hand');
  container.innerHTML = '';
  if (!state.hand || state.hand.length === 0) {
    document.getElementById('my-hand-area').style.display = 'none';
    return;
  }
  document.getElementById('my-hand-area').style.display = 'block';
  state.hand.forEach(cardId => {
    const el = createCardElement(cardId);
    el.style.cursor = 'default';
    container.appendChild(el);
  });
}

let selectedCards = [];
let handIsSelectable = false;

function makeHandSelectable(state, count) {
  handIsSelectable = true;
  selectedCard = null;
  selectedCards = [];
  const container = document.getElementById('my-hand');
  container.innerHTML = '';
  document.getElementById('my-hand-area').style.display = 'block';
  if (!state.hand) return;
  state.hand.forEach(cardId => {
    const el = createCardElement(cardId);
    el.classList.add('selectable');
    el.addEventListener('click', () => {
      if (count === 1) {
        container.querySelectorAll('.card-container').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedCard = cardId;
        selectedCards = [cardId];
      } else {
        if (el.classList.contains('selected')) {
          el.classList.remove('selected');
          selectedCards = selectedCards.filter(c => c !== cardId);
        } else {
          if (selectedCards.length >= count) return;
          el.classList.add('selected');
          selectedCards.push(cardId);
        }
        selectedCard = selectedCards.length > 0 ? selectedCards[0] : null;
      }
      updateSubmitButtons(count);
    });
    container.appendChild(el);
  });
}

function updateSubmitButtons(count) {
  const ready = selectedCards.length >= count;
  const clueBtn = document.getElementById('submit-clue-btn');
  const ctBtn = document.getElementById('submit-ct-btn');
  if (clueBtn) {
    const clue = document.getElementById('clue-input')?.value.trim();
    clueBtn.disabled = !(selectedCard && (clue || selectedGifUrl));
  }
  if (ctBtn) {
    ctBtn.disabled = !ready;
  }
}

function updateScoresPanel(state) {
  const list = document.getElementById('scores-list');
  list.innerHTML = '';
  const sorted = state.players.map((p, i) => ({ ...p, idx: i }))
    .sort((a, b) => b.score - a.score);
  sorted.forEach(p => {
    const div = document.createElement('div');
    div.className = 'sp-entry' + (p.idx === state.storytellerIdx ? ' storyteller' : '');
    div.innerHTML = `
      <span class="sp-name">${p.name}${p.idx === state.storytellerIdx ? ' ★' : ''}</span>
      <span class="sp-pts">${p.score}</span>
    `;
    list.appendChild(div);
  });
}

// --- STORYTELLER PHASE ---
function renderStoryteller(body, state) {
  const isSt = state.myIdx === state.storytellerIdx;
  const stName = state.players[state.storytellerIdx].name;

  if (isSt) {
    body.innerHTML = `
      <div class="phase-label">Ты — рассказчик</div>
      <p class="text-dim text-small text-center">Выбери карту и придумай ассоциацию</p>
      <div class="clue-input-area">
        <input class="input-field" id="clue-input" type="text" placeholder="Твоя ассоциация…" maxlength="100" autocomplete="off">
        <button class="gif-btn" onclick="openGifModal()">GIF</button>
        <button class="btn btn--small" id="submit-clue-btn" onclick="doSubmitClue()" disabled>Ок</button>
      </div>
      <div class="gif-preview" id="gif-preview">
        <img id="gif-preview-img">
        <button class="gif-remove" onclick="clearGif()">✕</button>
      </div>
    `;
    selectedCard = null;
    selectedGifUrl = null;
    makeHandSelectable(state, 1);
    document.getElementById('clue-input').addEventListener('input', updateClueBtn);
  } else {
    body.innerHTML = `
      <div class="waiting-msg">${stName} придумывает ассоциацию<span class="waiting-dots">...</span></div>
    `;
  }
}

let selectedGifUrl = null;

function updateClueBtn() {
  const btn = document.getElementById('submit-clue-btn');
  if (!btn) return;
  const clue = document.getElementById('clue-input')?.value.trim();
  btn.disabled = !(selectedCards.length >= 1 && (clue || selectedGifUrl));
}

function doSubmitClue() {
  const textClue = document.getElementById('clue-input').value.trim();
  const clue = selectedGifUrl ? 'gif:' + selectedGifUrl : textClue;
  if (!selectedCard || !clue) return;
  sendMsg({ type: 'storyteller', cardId: selectedCard, clue });
}

let gifNextPos = '';
const TENOR_KEY = 'AIzaSyAyimkuYQYF_FXVALexPuGQctUWRURdCYQ';

function openGifModal() {
  document.getElementById('gif-modal').classList.add('open');
  document.getElementById('gif-search').value = '';
  document.getElementById('gif-grid').innerHTML = '';
  gifNextPos = '';
  setTimeout(() => document.getElementById('gif-search').focus(), 100);
  document.getElementById('gif-search').addEventListener('keydown', e => { if (e.key === 'Enter') searchGifs(); }, { once: false });
}

function closeGifModal() {
  document.getElementById('gif-modal').classList.remove('open');
}

async function searchGifs(append) {
  const q = document.getElementById('gif-search').value.trim();
  if (!q) return;
  const grid = document.getElementById('gif-grid');
  if (!append) {
    grid.innerHTML = '<div style="color:var(--text-dim);font-size:12px;text-align:center;grid-column:1/-1;">Загрузка...</div>';
    gifNextPos = '';
  }
  try {
    let url = 'https://tenor.googleapis.com/v2/search?q=' + encodeURIComponent(q) + '&key=' + TENOR_KEY + '&limit=30&media_filter=tinygif,gif';
    if (gifNextPos) url += '&pos=' + gifNextPos;
    const res = await fetch(url);
    const data = await res.json();
    if (!append) grid.innerHTML = '';
    // Remove old load-more
    grid.querySelector('.gif-load-more')?.remove();
    (data.results || []).forEach(r => {
      const thumbUrl = r.media_formats?.tinygif?.url || r.media_formats?.gif?.url;
      if (!thumbUrl) return;
      const fullUrl = r.media_formats?.gif?.url || thumbUrl;
      const img = document.createElement('img');
      img.src = thumbUrl;
      img.loading = 'lazy';
      img.addEventListener('click', () => {
        selectGif(fullUrl);
      });
      grid.appendChild(img);
    });
    gifNextPos = data.next || '';
    if (gifNextPos) {
      const more = document.createElement('div');
      more.className = 'gif-load-more';
      more.style.gridColumn = '1/-1';
      more.innerHTML = '<button onclick="searchGifs(true)">Ещё</button>';
      grid.appendChild(more);
    }
    if (grid.children.length === 0) grid.innerHTML = '<div style="color:var(--text-muted);font-size:12px;grid-column:1/-1;">Ничего не найдено</div>';
  } catch {
    if (!append) grid.innerHTML = '<div style="color:var(--text-muted);font-size:12px;grid-column:1/-1;">Ошибка загрузки</div>';
  }
}

function selectGif(url) {
  selectedGifUrl = url;
  document.getElementById('gif-preview-img').src = url;
  document.getElementById('gif-preview').classList.add('visible');
  closeGifModal();
  const clueInput = document.getElementById('clue-input');
  if (clueInput) {
    clueInput.value = '';
    clueInput.disabled = true;
  }
  updateClueBtn();
}

function clearGif() {
  selectedGifUrl = null;
  document.getElementById('gif-preview').classList.remove('visible');
  const clueInput = document.getElementById('clue-input');
  if (clueInput) clueInput.disabled = false;
  updateClueBtn();
}

function renderClue(clue) {
  if (clue.startsWith('gif:')) {
    return '<img class="clue-gif" src="' + clue.slice(4) + '">';
  }
  return '"' + clue + '"';
}

// --- CONTRIBUTE PHASE ---
function renderContribute(body, state) {
  const isSt = state.myIdx === state.storytellerIdx;
  const needCards = state.cardsNeeded || 1;
  const myContribCount = state.myContribCount || 0;

  if (isSt) {
    body.innerHTML = `
      <div class="phase-label">Ассоциация</div>
      <div class="clue-display">${renderClue(state.clue)}</div>
      <div class="waiting-msg">Игроки выбирают карты<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.contributedCount} / ${state.totalContribNeeded}</div>
    `;
    return;
  }

  if (state.alreadyContributed) {
    body.innerHTML = `
      <div class="phase-label">Ассоциация</div>
      <div class="clue-display">${renderClue(state.clue)}</div>
      <div class="waiting-msg">Ожидание остальных<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.contributedCount} / ${state.totalContribNeeded}</div>
    `;
    return;
  }

  const remaining = needCards - myContribCount;
  body.innerHTML = `
    <div class="phase-label">Блеф</div>
    <div class="clue-display">${renderClue(state.clue)}</div>
    <p class="text-dim text-small text-center">Выбери ${remaining > 1 ? remaining + ' карты' : 'карту'} под ассоциацию</p>
    <button class="btn btn--small" id="submit-ct-btn" onclick="doSubmitContribute()" disabled>Отправить</button>
  `;
  selectedCard = null;
  makeHandSelectable(state, remaining);
}

function doSubmitContribute() {
  if (selectedCards.length === 0) return;
  selectedCards.forEach(cardId => {
    sendMsg({ type: 'contribute', cardId });
  });
}

// --- VOTE PHASE ---
function renderVote(body, state) {
  const isSt = state.myIdx === state.storytellerIdx;

  if (isSt) {
    body.innerHTML = `
      <div class="phase-label">Голосование</div>
      <div class="clue-display">${renderClue(state.clue)}</div>
      <div class="voting-grid" id="vt-grid"></div>
      <div class="waiting-msg" style="font-size:16px;">Игроки голосуют<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.votedCount} / ${state.totalNonSt}</div>
    `;
    const grid = document.getElementById('vt-grid');
    state.pool.forEach((cardId, i) => {
      const el = createCardElement(cardId, { label: String(i + 1) });
      el.style.cursor = 'default';
      grid.appendChild(el);
    });
    return;
  }

  if (state.alreadyVoted) {
    body.innerHTML = `
      <div class="phase-label">Голосование</div>
      <div class="clue-display">${renderClue(state.clue)}</div>
      <div class="voting-grid" id="vt-grid"></div>
      <div class="waiting-msg" style="font-size:14px;">Ожидание остальных<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.votedCount} / ${state.totalNonSt}</div>
    `;
    const grid = document.getElementById('vt-grid');
    state.pool.forEach((cardId, i) => {
      const el = createCardElement(cardId, { label: String(i + 1) });
      el.style.cursor = 'default';
      grid.appendChild(el);
    });
    return;
  }

  body.innerHTML = `
    <div class="phase-label">Голосование</div>
    <div class="clue-display">${renderClue(state.clue)}</div>
    <p class="text-dim text-small text-center">Угадай карту рассказчика</p>
    <div class="voting-grid" id="vt-grid"></div>
    <button class="btn btn--small" id="submit-vt-btn" onclick="doSubmitVote()" disabled>Голосовать</button>
  `;
  selectedCard = null;
  const grid = document.getElementById('vt-grid');
  const ownCards = state.ownCardIds || (state.ownCardId ? [state.ownCardId] : []);
  state.pool.forEach((cardId, i) => {
    const isOwn = ownCards.includes(cardId);
    const el = createCardElement(cardId, { disabled: isOwn, label: String(i + 1) });
    el.addEventListener('click', () => {
      if (isOwn) return;
      grid.querySelectorAll('.card-container').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedCard = cardId;
      document.getElementById('submit-vt-btn').disabled = false;
    });
    grid.appendChild(el);
  });
}

function doSubmitVote() {
  if (!selectedCard) return;
  sendMsg({ type: 'vote', cardId: selectedCard });
}

// --- RESULTS PHASE ---
function renderResults(body, state) {
  const res = state.results;
  if (!res) return;

  const isGameOver = res.isGameOver;
  let html = '';

  if (isGameOver) {
    // Show last round cards like normal results
    html += `<div class="phase-label">Раскрытие</div>`;
    html += `<div class="clue-display">${renderClue(state.clue)}</div>`;
    html += `<div class="results-cards-area">`;
    res.pool.forEach(entry => {
      const isSt = entry.isStoryteller;
      html += `<div class="result-card-wrapper">`;
      html += `<div class="card-container${isSt ? ' storyteller-card' : ''}" style="cursor:default;">`;
      const idx = parseInt(entry.cardId.split('_')[1]);
      html += `<img src="${serverImageUrls[idx] || ''}" draggable="false" style="width:100%;height:100%;display:block;object-fit:cover;">`;
      html += `</div>`;
      html += `<div class="owner-label${isSt ? ' storyteller' : ''}">${entry.ownerName}${isSt ? ' ★' : ''}</div>`;
      if (entry.voters.length > 0) {
        html += `<div class="votes-list">Голоса: ${entry.voters.join(', ')}</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;

    // Leaderboard instead of round scores
    const winner = state.players.reduce((a, b) => a.score >= b.score ? a : b);
    const medals = ['🥇', '🥈', '🥉'];
    const tierClass = ['gold', 'silver', 'bronze'];
    const leaderboard = state.players.map((p, i) => ({ name: p.name, score: p.score, idx: i }))
      .sort((a, b) => b.score - a.score);

    html += `<div class="game-over-banner">${winner.name} побеждает!</div>`;
    html += `<div class="game-over-sub">${winner.score} очков за ${state.round} раундов</div>`;
    html += `<div class="leaderboard">`;
    leaderboard.forEach((p, i) => {
      const cls = i < 3 ? ` ${tierClass[i]}` : '';
      const medal = i < 3 ? medals[i] : `${i + 1}.`;
      html += `<div class="lb-entry${cls}">
        <span class="lb-place">${medal}</span>
        <span class="lb-name">${p.name}</span>
        <span class="lb-score">${p.score}</span>
      </div>`;
    });
    html += `</div>`;
    html += `<button class="btn mt-12" onclick="showTitle()">На главную</button>`;
  } else {
    html += `<div class="phase-label">Раскрытие</div>`;
    html += `<div class="clue-display">${renderClue(state.clue)}</div>`;
    html += `<div class="results-cards-area">`;
    res.pool.forEach(entry => {
      const isSt = entry.isStoryteller;
      html += `<div class="result-card-wrapper">`;
      html += `<div class="card-container${isSt ? ' storyteller-card' : ''}" style="cursor:default;">`;
      const idx = parseInt(entry.cardId.split('_')[1]);
      html += `<img src="${serverImageUrls[idx] || ''}" draggable="false" style="width:100%;height:100%;display:block;object-fit:cover;">`;
      html += `</div>`;
      html += `<div class="owner-label${isSt ? ' storyteller' : ''}">${entry.ownerName}${isSt ? ' ★' : ''}</div>`;
      if (entry.voters.length > 0) {
        html += `<div class="votes-list">Голоса: ${entry.voters.join(', ')}</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;

    // Score changes
    html += `<div class="score-changes">`;
    html += `<div style="color:var(--text-dim);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Очки за раунд</div>`;
    const sorted = state.players.map((p, i) => ({ name: p.name, pts: res.roundScores[i] || 0, total: p.score }))
      .sort((a, b) => b.pts - a.pts);
    sorted.forEach(e => {
      html += `<div class="score-row">
        <span class="name">${e.name}</span>
        <span class="points ${e.pts === 0 ? 'zero' : ''}">+${e.pts} (${e.total})</span>
      </div>`;
    });
    html += `</div>`;

    if (state.isCreator) {
      html += `<button class="btn mt-12" onclick="requestNextRound()">Следующий раунд</button>`;
    } else {
      html += `<div class="waiting-msg" style="font-size:14px;margin-top:12px;">Ожидание хоста<span class="waiting-dots">...</span></div>`;
    }
  }

  body.innerHTML = html;
}

// ============================================================
// INDEXEDDB — LOCAL IMAGE STORAGE
// ============================================================
let customImages = []; // [{id, dataUrl, name}]

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('xaxit-images', 1);
    req.onupgradeneeded = () => {
      if (!req.result.objectStoreNames.contains('images')) {
        req.result.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbLoadCustom() {
  try {
    const db = await openDB();
    return new Promise(r => {
      const tx = db.transaction('images', 'readonly');
      const req = tx.objectStore('images').getAll();
      req.onsuccess = () => r(req.result || []);
      req.onerror = () => r([]);
    });
  } catch { return []; }
}

async function dbSaveCustom(dataUrl, name) {
  const db = await openDB();
  return new Promise(r => {
    const tx = db.transaction('images', 'readwrite');
    const req = tx.objectStore('images').add({ dataUrl, name, addedAt: Date.now() });
    req.onsuccess = () => r(req.result);
  });
}

async function dbDeleteCustom(id) {
  const db = await openDB();
  return new Promise(r => {
    const tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').delete(id);
    tx.oncomplete = () => r();
  });
}

function getDeletedDefaults() {
  try { return JSON.parse(localStorage.getItem('xaxit-deleted-defaults') || '[]'); }
  catch { return []; }
}

function saveDeletedDefaults(list) {
  localStorage.setItem('xaxit-deleted-defaults', JSON.stringify(list));
}

function rebuildImageFiles() {
  const deleted = new Set(getDeletedDefaults());
  const activeDefaults = DEFAULT_IMAGES.filter(f => !deleted.has(f));
  IMAGE_FILES = [...activeDefaults, ...customImages.map(c => c.dataUrl)];
}

async function initImages() {
  customImages = await dbLoadCustom();
  rebuildImageFiles();
}

// ============================================================
// CROP MODAL
// ============================================================
const cropState = {
  img: null,
  fileName: '',
  scale: 1,
  minScale: 1,
  offsetX: 0,
  offsetY: 0,
  dragging: false,
  startX: 0,
  startY: 0,
  containerW: 0,
  containerH: 0
};

function openCropModal(file) {
  if (!file || !file.type.startsWith('image/')) return;
  if (file.size > 10 * 1024 * 1024) { showStatus('Файл слишком большой (макс. 10 МБ)'); return; }

  cropState.fileName = file.name;
  const overlay = document.getElementById('crop-overlay');
  overlay.classList.add('open');

  const img = new Image();
  img.onload = () => {
    cropState.img = img;
    const container = document.getElementById('crop-container');
    container.innerHTML = '';
    const rect = container.getBoundingClientRect();
    cropState.containerW = rect.width;
    cropState.containerH = rect.height;

    const scaleX = cropState.containerW / img.naturalWidth;
    const scaleY = cropState.containerH / img.naturalHeight;
    cropState.minScale = Math.max(scaleX, scaleY);
    cropState.scale = cropState.minScale;
    cropState.offsetX = (cropState.containerW - img.naturalWidth * cropState.scale) / 2;
    cropState.offsetY = (cropState.containerH - img.naturalHeight * cropState.scale) / 2;

    const el = document.createElement('img');
    el.src = img.src;
    el.draggable = false;
    container.appendChild(el);
    updateCropPreview();

    const slider = document.getElementById('crop-zoom');
    slider.min = cropState.minScale;
    slider.max = cropState.minScale * 3;
    slider.step = 0.001;
    slider.value = cropState.scale;
  };
  img.src = URL.createObjectURL(file);

  const container = document.getElementById('crop-container');
  container.onmousedown = cropDragStart;
  container.ontouchstart = cropDragStart;
  document.onmousemove = cropDragMove;
  document.ontouchmove = cropDragMove;
  document.onmouseup = cropDragEnd;
  document.ontouchend = cropDragEnd;
}

function updateCropPreview() {
  const container = document.getElementById('crop-container');
  const el = container.querySelector('img');
  if (!el || !cropState.img) return;
  el.style.width = (cropState.img.naturalWidth * cropState.scale) + 'px';
  el.style.height = (cropState.img.naturalHeight * cropState.scale) + 'px';
  el.style.left = cropState.offsetX + 'px';
  el.style.top = cropState.offsetY + 'px';
}

function constrainCropOffset() {
  const w = cropState.img.naturalWidth * cropState.scale;
  const h = cropState.img.naturalHeight * cropState.scale;
  cropState.offsetX = Math.min(0, Math.max(cropState.containerW - w, cropState.offsetX));
  cropState.offsetY = Math.min(0, Math.max(cropState.containerH - h, cropState.offsetY));
}

function cropDragStart(e) {
  e.preventDefault();
  cropState.dragging = true;
  const pt = e.touches ? e.touches[0] : e;
  cropState.startX = pt.clientX - cropState.offsetX;
  cropState.startY = pt.clientY - cropState.offsetY;
}

function cropDragMove(e) {
  if (!cropState.dragging) return;
  e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  cropState.offsetX = pt.clientX - cropState.startX;
  cropState.offsetY = pt.clientY - cropState.startY;
  constrainCropOffset();
  updateCropPreview();
}

function cropDragEnd() {
  cropState.dragging = false;
}

function cropZoom(val) {
  const cx = cropState.containerW / 2;
  const cy = cropState.containerH / 2;
  const imgX = (cx - cropState.offsetX) / cropState.scale;
  const imgY = (cy - cropState.offsetY) / cropState.scale;
  cropState.scale = parseFloat(val);
  cropState.offsetX = cx - imgX * cropState.scale;
  cropState.offsetY = cy - imgY * cropState.scale;
  constrainCropOffset();
  updateCropPreview();
}

async function cropSave() {
  if (!cropState.img) return;
  const canvas = document.createElement('canvas');
  canvas.width = 600;
  canvas.height = 840;
  const ctx = canvas.getContext('2d');
  const sx = -cropState.offsetX / cropState.scale;
  const sy = -cropState.offsetY / cropState.scale;
  const sw = cropState.containerW / cropState.scale;
  const sh = cropState.containerH / cropState.scale;
  ctx.drawImage(cropState.img, sx, sy, sw, sh, 0, 0, 600, 840);

  let q = 0.8;
  let dataUrl = canvas.toDataURL('image/jpeg', q);
  while (dataUrl.length > 300 * 1370 && q > 0.2) {
    q -= 0.1;
    dataUrl = canvas.toDataURL('image/jpeg', q);
  }

  URL.revokeObjectURL(cropState.img.src);
  closeCropModal();

  const id = await dbSaveCustom(dataUrl, cropState.fileName);
  customImages.push({ id, dataUrl, name: cropState.fileName });
  rebuildImageFiles();
  renderAdminGallery();
  showStatus('Изображение добавлено!');
}

function closeCropModal() {
  document.getElementById('crop-overlay').classList.remove('open');
  document.getElementById('crop-container').innerHTML = '';
  document.onmousemove = null;
  document.ontouchmove = null;
  document.onmouseup = null;
  document.ontouchend = null;
  cropState.img = null;
  cropState.dragging = false;
}

// ============================================================
// ADMIN PANEL
// ============================================================
let adminAuthed = false;

function openAdmin() {
  document.getElementById('admin-overlay').classList.add('open');
  if (adminAuthed) {
    renderAdminGallery();
  } else {
    renderAdminPassword();
  }
}

function closeAdmin() {
  document.getElementById('admin-overlay').classList.remove('open');
}

function renderAdminPassword() {
  const body = document.getElementById('admin-body');
  body.innerHTML = `
    <div class="admin-password-form">
      <p class="text-dim text-small">Введите пароль администратора</p>
      <input class="input-field" id="admin-pw" type="password" placeholder="Пароль" autocomplete="off">
      <button class="btn btn--small" onclick="checkAdminPassword()">Войти</button>
      <p id="admin-pw-error" style="color:var(--danger);font-size:13px;display:none;">Неверный пароль</p>
    </div>
  `;
  setTimeout(() => document.getElementById('admin-pw')?.focus(), 100);
  document.getElementById('admin-pw')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkAdminPassword();
  });
}

function checkAdminPassword() {
  const pw = document.getElementById('admin-pw')?.value;
  if (pw === ADMIN_PASSWORD) {
    adminAuthed = true;
    renderAdminGallery();
  } else {
    const err = document.getElementById('admin-pw-error');
    if (err) err.style.display = 'block';
  }
}

function renderAdminGallery() {
  const deleted = new Set(getDeletedDefaults());
  const activeDefaults = DEFAULT_IMAGES.filter(f => !deleted.has(f));
  const body = document.getElementById('admin-body');
  const total = activeDefaults.length + customImages.length;

  let html = `
    <div class="admin-upload-area" id="admin-upload-area">
      <div style="font-size:28px;margin-bottom:8px;">📤</div>
      <div style="color:var(--text);font-size:14px;">Нажмите или перетащите файл</div>
      <div class="admin-upload-hint">
        JPG/PNG/WebP • Изображение обрезается под карточку (5:7)<br>
        Выходное разрешение: 600×840px • Сжатие до ~300 КБ
      </div>
      <input type="file" id="admin-file-input" accept="image/*">
    </div>
    <div class="admin-count">Всего карт: ${total} (базовых: ${activeDefaults.length}, добавленных: ${customImages.length})</div>
    <div class="admin-gallery" id="admin-gallery">
  `;

  activeDefaults.forEach((src) => {
    html += `
      <div class="admin-gallery-item">
        <img src="${src}" loading="lazy">
        <button class="delete-btn" onclick="adminDeleteDefault('${src.replace(/'/g, "\\'")}')" title="Удалить">🗑</button>
        <div class="img-badge">базовая</div>
      </div>
    `;
  });

  customImages.forEach((img) => {
    html += `
      <div class="admin-gallery-item">
        <img src="${img.dataUrl}" loading="lazy">
        <button class="delete-btn" onclick="adminDeleteCustom(${img.id})" title="Удалить">🗑</button>
        <div class="img-badge">${(img.name || 'custom').slice(0, 15)}</div>
      </div>
    `;
  });

  html += '</div>';
  body.innerHTML = html;

  const uploadArea = document.getElementById('admin-upload-area');
  const fileInput = document.getElementById('admin-file-input');
  uploadArea.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = 'var(--gold)'; });
  uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = '';
    if (e.dataTransfer.files.length > 0) openCropModal(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) openCropModal(fileInput.files[0]);
    fileInput.value = '';
  });
}

function adminDeleteDefault(filename) {
  const deleted = getDeletedDefaults();
  if (!deleted.includes(filename)) deleted.push(filename);
  saveDeletedDefaults(deleted);
  rebuildImageFiles();
  renderAdminGallery();
}

async function adminDeleteCustom(id) {
  await dbDeleteCustom(id);
  customImages = customImages.filter(c => c.id !== id);
  rebuildImageFiles();
  renderAdminGallery();
}

// ============================================================
// INIT
// ============================================================
(async () => {
  await initImages();

  // Parse URL path for routing
  const pathMatch = location.pathname.match(/^\/(room|join)\/([A-Z0-9]{4})$/i);
  const routeCode = pathMatch ? pathMatch[2].toUpperCase() : null;
  const routeType = pathMatch ? pathMatch[1] : null;

  // Try reconnect from saved session
  const raw = sessionStorage.getItem('xaxit-session');
  if (raw) {
    try {
      const s = JSON.parse(raw);
      if (s.roomCode && s.playerName) {
        NET.myName = s.playerName;
        connectToRoom(s.roomCode, () => {
          sendMsg({ type: 'rejoin', name: s.playerName });
        });
        return;
      }
    } catch {}
  }

  // If URL has a room code via /join/CODE or /room/CODE
  if (routeCode) {
    document.getElementById('join-code').value = routeCode;
    showJoin();
    return;
  }

  // Also support old hash-based URLs
  const hash = location.hash.replace('#', '').toUpperCase();
  if (hash && hash.length === 4) {
    document.getElementById('join-code').value = hash;
    history.replaceState(null, '', '/join/' + hash);
    showJoin();
    return;
  }

  showTitle();
})();
