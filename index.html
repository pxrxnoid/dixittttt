<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>XAxit — Игра ассоциаций</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0d1117;
  --bg-card: #161b22;
  --bg-surface: #1c2333;
  --gold: #e8a83e;
  --gold-dim: #b8862e;
  --gold-glow: rgba(232, 168, 62, 0.3);
  --amber: #f0c060;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #484f58;
  --accent-blue: #58a6ff;
  --accent-purple: #bc8cff;
  --accent-rose: #f78166;
  --success: #56d364;
  --danger: #f85149;
  --card-w: 120px;
  --card-h: 168px;
  --radius: 12px;
  --transition: 0.3s ease;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

h1, h2, h3 {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
}

button {
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  border: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

input {
  font-family: 'Inter', sans-serif;
  outline: none;
}

/* ============================================================
   APP CONTAINER & SCREENS
   ============================================================ */
#app {
  width: 100%; height: 100%;
  position: relative;
  overflow: hidden;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  overflow-y: auto;
  background: radial-gradient(ellipse at 50% 40%, #1a2340 0%, var(--bg-deep) 70%);
}
.screen.active {
  opacity: 1;
  pointer-events: auto;
}

/* ============================================================
   SHARED UI
   ============================================================ */
.btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-dim));
  color: var(--bg-deep);
  font-weight: 600;
  font-size: 16px;
  padding: 14px 36px;
  border-radius: 50px;
  letter-spacing: 0.5px;
  transition: transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 20px var(--gold-glow);
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.4; pointer-events: none; }
.btn--secondary {
  background: var(--bg-surface);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border: 1px solid var(--text-muted);
}
.btn--small { font-size: 14px; padding: 10px 24px; }

.phase-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 8px;
}

.clue-display {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 24px;
  color: var(--amber);
  text-align: center;
  margin: 12px 0;
  padding: 12px 24px;
  border-left: 3px solid var(--gold-dim);
  max-width: 400px;
  word-break: break-word;
}

.input-field {
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 15px;
  transition: border-color var(--transition);
  width: 100%;
  max-width: 300px;
}
.input-field:focus { border-color: var(--gold); }

.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.gap-20 { gap: 20px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mt-12 { margin-top: 12px; }
.text-center { text-align: center; }
.text-dim { color: var(--text-dim); }
.text-small { font-size: 13px; }
.text-gold { color: var(--gold); }

/* ============================================================
   TITLE SCREEN
   ============================================================ */
.title-logo {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--amber), #f4d896);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  text-align: center;
}
.title-sub {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--text-dim);
  margin-bottom: 48px;
}
.title-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.title-particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-100vh) scale(1); }
}
.title-buttons {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

/* ============================================================
   LOBBY SCREEN
   ============================================================ */
.room-code-box {
  background: var(--bg-surface);
  border: 2px dashed var(--gold-dim);
  border-radius: 16px;
  padding: 16px 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition);
  position: relative;
}
.room-code-box:active { border-color: var(--gold); }
.room-code-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.room-code {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 8px;
}
.room-code-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}
.copied-toast {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--success);
  color: var(--bg-deep);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.3s;
}
.copied-toast.show { opacity: 1; }

.player-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 300px;
}
.player-list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--bg-surface);
  border-radius: 10px;
  font-size: 15px;
}
.player-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}
.player-list-item .host-badge {
  font-size: 10px;
  color: var(--gold);
  margin-left: auto;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Score switch */
.score-switch {
  display: flex;
  gap: 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--text-muted);
}
.score-option {
  padding: 10px 20px;
  background: var(--bg-surface);
  color: var(--text-dim);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
}
.score-option.active {
  background: var(--gold);
  color: var(--bg-deep);
}

/* ============================================================
   GAME SCREEN
   ============================================================ */
#game-screen {
  justify-content: flex-start;
  padding-top: 0;
  padding-bottom: 16px;
}

.game-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(0,0,0,0.3);
  flex-shrink: 0;
}
.game-header .round-info {
  font-size: 13px;
  color: var(--text-dim);
}
.game-header .round-info b {
  color: var(--gold);
  font-weight: 600;
}
.game-header .my-name {
  font-size: 13px;
  color: var(--accent-purple);
  font-weight: 500;
}

/* Scoreboard (floating bottom-right) */
.scores-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 100;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  color: var(--gold);
  font-size: 18px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.scores-toggle.visible { display: flex; }

.scores-panel {
  position: fixed;
  bottom: 16px; right: 16px;
  width: 200px;
  max-height: 280px;
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  border-radius: 12px;
  z-index: 99;
  transform: translateX(calc(100% + 32px));
  transition: transform 0.3s ease;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.scores-panel.open { transform: translateX(0); }
.scores-panel-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  color: var(--gold);
  margin-bottom: 4px;
}
.scores-panel-close {
  position: absolute;
  top: 8px; right: 10px;
  background: none;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
}
.sp-entry {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  font-size: 13px;
}
.sp-entry.storyteller { border-left: 3px solid var(--gold); }
.sp-entry .sp-name { font-weight: 500; }
.sp-entry .sp-pts { color: var(--accent-blue); font-weight: 600; }
.sp-entry.storyteller .sp-name { color: var(--gold); }

/* Desktop: always show scores panel during game, hide toggle */
@media (min-width: 769px) {
  .scores-toggle.visible { display: none !important; }
  .scores-panel-close { display: none; }
}

/* Game body */
.game-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  width: 100%;
  overflow-y: auto;
  padding: 12px 0;
}

/* Waiting state */
.waiting-msg {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--text-dim);
  text-align: center;
  max-width: 320px;
}
.waiting-progress {
  font-size: 14px;
  color: var(--text-muted);
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.waiting-dots {
  animation: pulse 1.5s ease-in-out infinite;
}

/* Clue input */
.clue-input-area {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 400px;
  align-items: center;
}
.clue-input-area input {
  flex: 1;
}

/* Cards */
.hand-area {
  display: flex;
  gap: 10px;
  padding: 12px 8px;
  overflow-x: auto;
  max-width: 100%;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--text-muted) transparent;
  justify-content: center;
  flex-wrap: wrap;
}

.card-container {
  width: var(--card-w);
  min-width: var(--card-w);
  height: var(--card-h);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
  border: 2px solid var(--text-muted);
  cursor: pointer;
  transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  position: relative;
  flex-shrink: 0;
}
.card-container.selectable:hover {
  transform: translateY(-10px);
  border-color: rgba(255,255,255,0.4);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
.card-container:active { transform: scale(0.97); }
.card-container.selected {
  border-color: var(--gold);
  box-shadow: 0 0 20px var(--gold-glow), 0 0 40px var(--gold-glow), 0 10px 30px rgba(0,0,0,0.5);
  transform: translateY(-14px) scale(1.03);
}
.card-container.disabled { opacity: 0.35; pointer-events: none; }
.card-container.storyteller-card {
  box-shadow: 0 0 20px var(--gold-glow), 0 0 40px var(--gold-glow);
  border: 2px solid var(--gold);
}
.card-container img {
  width: 100%; height: 100%;
  display: block;
  object-fit: cover;
}
.card-number {
  position: absolute;
  bottom: 4px; right: 6px;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  font-weight: 600;
  pointer-events: none;
}

/* Voting grid */
.voting-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  max-width: 560px;
}
.voting-grid .card-container {
  width: 110px; min-width: 110px; height: 154px;
}

/* Results */
.results-cards-area {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
  max-width: 600px;
}
.result-card-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.result-card-wrapper .owner-label {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
}
.result-card-wrapper .owner-label.storyteller {
  color: var(--gold);
  font-weight: 600;
}
.result-card-wrapper .votes-list {
  font-size: 11px;
  color: var(--accent-blue);
  text-align: center;
}
.score-changes {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
  max-width: 360px;
}
.score-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-surface);
  border-radius: 8px;
}
.score-row .name { font-weight: 500; }
.score-row .points { color: var(--success); font-weight: 600; }
.score-row .points.zero { color: var(--text-muted); }

/* Game over */
.game-over-banner {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: var(--amber);
  text-align: center;
  margin-bottom: 4px;
}
.game-over-sub {
  font-size: 14px;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 16px;
}
.leaderboard {
  width: 100%;
  max-width: 360px;
  margin: 0 auto 16px;
}
.lb-entry {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-radius: 10px;
  margin-bottom: 6px;
  background: var(--bg-surface);
}
.lb-entry.gold { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05)); border: 1px solid rgba(255,215,0,0.3); }
.lb-entry.silver { background: linear-gradient(135deg, rgba(192,192,192,0.12), rgba(192,192,192,0.04)); border: 1px solid rgba(192,192,192,0.2); }
.lb-entry.bronze { background: linear-gradient(135deg, rgba(205,127,50,0.12), rgba(205,127,50,0.04)); border: 1px solid rgba(205,127,50,0.2); }
.lb-place {
  font-size: 22px;
  width: 36px;
  text-align: center;
  flex-shrink: 0;
}
.lb-name {
  flex: 1;
  font-weight: 600;
  font-size: 16px;
}
.lb-score {
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
}

/* Error / status bar */
.status-bar {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: var(--danger);
  color: white;
  text-align: center;
  padding: 10px;
  font-size: 14px;
  font-weight: 500;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.3s;
}
.status-bar.show { transform: translateY(0); }

/* ============================================================
   ADMIN PANEL
   ============================================================ */
.admin-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 10;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  color: var(--text-dim);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--transition);
}
.admin-btn:hover { color: var(--gold); border-color: var(--gold); }

.admin-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.admin-overlay.open { display: flex; }

.admin-modal {
  background: var(--bg-card);
  border: 1px solid var(--text-muted);
  border-radius: 16px;
  width: 100%;
  max-width: 700px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--text-muted);
  flex-shrink: 0;
}
.admin-header h2 {
  font-size: 20px;
  color: var(--gold);
}
.admin-close {
  background: none;
  color: var(--text-dim);
  font-size: 24px;
  cursor: pointer;
}
.admin-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
}
.admin-password-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 32px 0;
}
.admin-upload-area {
  border: 2px dashed var(--text-muted);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
  cursor: pointer;
  transition: border-color var(--transition);
}
.admin-upload-area:hover { border-color: var(--gold); }
.admin-upload-area input { display: none; }
.admin-upload-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
}
.admin-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px;
}
.admin-gallery-item {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 5/7;
  background: var(--bg-surface);
}
.admin-gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.admin-gallery-item .delete-btn {
  position: absolute;
  top: 4px; right: 4px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: var(--danger);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.admin-gallery-item:hover .delete-btn { opacity: 1; }
@media (max-width: 768px) {
  .admin-gallery-item .delete-btn { opacity: 0.85; }
}
.admin-gallery-item .img-badge {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.6);
  color: var(--text-dim);
  font-size: 10px;
  padding: 2px 6px;
  text-align: center;
}
.admin-count {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

/* ============================================================
   CROP MODAL
   ============================================================ */
.crop-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 400;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 16px;
}
.crop-overlay.open { display: flex; }
.crop-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--gold);
}
.crop-container {
  width: min(280px, 75vw);
  aspect-ratio: 5/7;
  position: relative;
  overflow: hidden;
  border: 2px solid var(--gold);
  border-radius: 12px;
  background: #000;
  touch-action: none;
}
.crop-container img {
  position: absolute;
  cursor: grab;
  user-select: none;
  pointer-events: none;
}
.crop-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-dim);
  font-size: 13px;
}
.crop-slider {
  width: 180px;
  accent-color: var(--gold);
}
.crop-buttons {
  display: flex;
  gap: 12px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 480px) {
  .title-logo { font-size: 44px; }
  .title-sub { font-size: 15px; }
  .room-code { font-size: 36px; }
  :root { --card-w: 95px; --card-h: 133px; }
  .voting-grid .card-container { width: 90px; min-width: 90px; height: 126px; }
  .clue-display { font-size: 20px; }
}
@media (max-width: 360px) {
  :root { --card-w: 80px; --card-h: 112px; }
  .voting-grid .card-container { width: 78px; min-width: 78px; height: 109px; }
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }

</head>
<body>

<div id="app">
  <!-- TITLE -->
  <div id="title-screen" class="screen active">
    <div class="title-particles" id="title-particles"></div>
    <button class="admin-btn" onclick="openAdmin()" title="Управление картинками">🖼</button>
    <img src="logo.png" alt="XAxit" style="max-width:380px;max-height:180px;margin-bottom:8px;width:80%;">
    <div class="title-sub">игра ассоциаций</div>
    <div class="title-buttons">
      <button class="btn" onclick="showCreate()">Создать игру</button>
      <button class="btn btn--secondary" onclick="showJoin()">Присоединиться</button>
    </div>
  </div>

  <!-- CREATE GAME -->
  <div id="create-screen" class="screen">
    <h2 style="font-size:24px;color:var(--gold);margin-bottom:16px;">Создать игру</h2>
    <input class="input-field mb-16" id="create-name" type="text" placeholder="Твой никнейм" maxlength="20" autocomplete="off">
    <p class="text-dim text-small mb-8">Играть до:</p>
    <div class="score-switch mb-16">
      <button class="score-option active" data-score="32" onclick="pickScore(this)">32</button>
      <button class="score-option" data-score="54" onclick="pickScore(this)">54</button>
      <button class="score-option" data-score="67" onclick="pickScore(this)">67</button>
      <input class="score-option" id="custom-score" type="number" min="1" max="999" placeholder="своё" style="width:72px;text-align:center;border:1px solid var(--text-muted);border-radius:8px;font-size:16px;padding:4px 8px;background:var(--bg);color:var(--text);" onfocus="pickCustomScore()" oninput="pickCustomScore()">
    </div>
    <button class="btn" id="create-btn" onclick="doCreate()">Создать</button>
    <button class="btn btn--secondary btn--small mt-12" onclick="showTitle()">Назад</button>
    <p id="create-status" class="text-dim text-small mt-12" style="display:none;"></p>
  </div>

  <!-- JOIN GAME -->
  <div id="join-screen" class="screen">
    <h2 style="font-size:24px;color:var(--gold);margin-bottom:16px;">Присоединиться</h2>
    <input class="input-field mb-16" id="join-name" type="text" placeholder="Твой никнейм" maxlength="20" autocomplete="off">
    <input class="input-field mb-16" id="join-code" type="text" placeholder="Код комнаты" maxlength="4" autocomplete="off" style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:20px;">
    <button class="btn" id="join-btn" onclick="doJoin()">Войти</button>
    <button class="btn btn--secondary btn--small mt-12" onclick="showTitle()">Назад</button>
    <p id="join-status" class="text-dim text-small mt-12" style="display:none;"></p>
  </div>

  <!-- LOBBY -->
  <div id="lobby-screen" class="screen">
    <div class="room-code-box" id="room-code-box" onclick="copyCode()">
      <div class="room-code-label">Код комнаты</div>
      <div class="room-code" id="lobby-code"></div>
      <div class="room-code-hint">нажми чтобы скопировать</div>
      <div class="copied-toast" id="copied-toast">Скопировано!</div>
    </div>
    <p class="text-dim text-small mt-12 mb-8">Игроки:</p>
    <div class="player-list" id="lobby-players"></div>
    <p class="text-dim text-small mt-12" id="lobby-score-label"></p>
    <button class="btn mt-12" id="lobby-start-btn" onclick="doStartGame()" style="display:none;">Начать игру</button>
    <p class="text-dim text-small mt-12" id="lobby-wait" style="display:none;">Ожидание хоста...</p>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <span class="round-info">Раунд <b id="gh-round">1</b></span>
      <span class="my-name" id="gh-name"></span>
    </div>
    <div class="game-body" id="game-body"></div>
    <div id="my-hand-area" style="width:100%;flex-shrink:0;border-top:1px solid var(--text-muted);padding:8px 0 4px;">
      <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:4px;">Твоя рука</div>
      <div class="hand-area" id="my-hand" style="justify-content:center;"></div>
    </div>
  </div>
</div>

<!-- Floating scores toggle -->
<button class="scores-toggle" id="scores-toggle" onclick="toggleScores()">★</button>
<div class="scores-panel" id="scores-panel">
  <button class="scores-panel-close" onclick="toggleScores()">&times;</button>
  <div class="scores-panel-title">Очки</div>
  <div id="scores-list"></div>
</div>

<!-- Status bar -->
<div class="status-bar" id="status-bar"></div>

<!-- Crop modal -->
<div class="crop-overlay" id="crop-overlay">
  <div class="crop-title">Обрезка изображения</div>
  <div class="crop-container" id="crop-container"></div>
  <div class="crop-controls">
    <span>−</span>
    <input type="range" class="crop-slider" id="crop-zoom" min="1" max="3" step="0.01" value="1" oninput="cropZoom(this.value)">
    <span>+</span>
  </div>
  <div class="crop-buttons">
    <button class="btn btn--secondary btn--small" onclick="closeCropModal()">Отмена</button>
    <button class="btn btn--small" onclick="cropSave()">Сохранить</button>
  </div>
</div>

<!-- Admin overlay -->
<div class="admin-overlay" id="admin-overlay">
  <div class="admin-modal">
    <div class="admin-header">
      <h2 id="admin-title">Управление картинками</h2>
      <button class="admin-close" onclick="closeAdmin()">&times;</button>
    </div>
    <div class="admin-body" id="admin-body">
      <!-- Filled dynamically -->
    </div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const DEFAULT_IMAGES = [
  '1E8B0269-6F4A-455E-8E32-D92A80529A71.JPG',
  '4A06414C-606A-4326-B9AF-F92E56E52264 (1).JPG',
  '85D134AB-4E4B-47BE-AB7F-36E0E29F8533.PNG',
  'B21DBD94-BA39-463A-A9CB-2D0B5E08CACB.JPG',
  'DF91EC43-7970-485D-B1C5-4FFDF61A77A2 (1).PNG',
  'IMG_6773.JPG',
  'IMG_6944.JPG',
  'IMG_7085.JPG'
];
let IMAGE_FILES = [...DEFAULT_IMAGES];
const HAND_SIZE = 5;
const PEER_PREFIX = 'xaxit-game-';
const ADMIN_PASSWORD = 'maslo54';

// ============================================================
// STATE
// ============================================================

/* Network state */
const NET = {
  peer: null,
  isHost: false,
  roomCode: '',
  myName: '',
  myIdx: -1,
  hostConn: null,       // client: connection to host
  conns: [],            // host: [{conn, playerIdx}]
};

/* Host-authoritative game state */
const HOST = {
  players: [],          // [{name, score, hand:[], conn:null}]
  allCardIds: [],
  deck: [],
  phase: 'lobby',
  round: 0,
  winScore: 32,
  storytellerIdx: 0,
  storytellerCard: null,
  clue: '',
  contributions: [],    // [{playerIdx, cardId}]
  votes: [],            // [{voterIdx, cardId}]
  shuffledPool: [],     // [{cardId, ownerIdx}]
  roundScores: {},
};

/* Local client state */
let localState = null;  // last state received from host
let selectedCard = null;

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const toggle = document.getElementById('scores-toggle');
  const panel = document.getElementById('scores-panel');
  if (id === 'game-screen') {
    toggle.classList.add('visible');
    // Desktop: auto-open scores panel
    if (window.innerWidth > 768) panel.classList.add('open');
  } else {
    toggle.classList.remove('visible');
    panel.classList.remove('open');
  }
}

function showTitle() {
  if (NET.peer) { NET.peer.destroy(); NET.peer = null; }
  NET.hostConn = null;
  NET.conns = [];
  showScreen('title-screen');
}

function showCreate() { showScreen('create-screen'); }
function showJoin() { showScreen('join-screen'); }

function showStatus(msg) {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 3000);
}

// ============================================================
// TITLE PARTICLES
// ============================================================
(function() {
  const c = document.getElementById('title-particles');
  const colors = ['#e8a83e', '#f0c060', '#bc8cff', '#58a6ff', '#f78166'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'title-particle';
    const size = 3 + Math.random() * 6;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '-10px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    c.appendChild(p);
  }
})();

// ============================================================
// SCORE SWITCH
// ============================================================
function pickScore(el) {
  document.querySelectorAll('.score-option').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('custom-score').value = '';
}
function pickCustomScore() {
  document.querySelectorAll('.score-option').forEach(b => b.classList.remove('active'));
  document.getElementById('custom-score').classList.add('active');
}
function getSelectedScore() {
  const customInput = document.getElementById('custom-score');
  if (customInput.classList.contains('active') && customInput.value) {
    return Math.max(1, parseInt(customInput.value) || 32);
  }
  const active = document.querySelector('button.score-option.active');
  return active ? parseInt(active.dataset.score) : 32;
}

// ============================================================
// UTILITY
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function createCardElement(cardId, opts = {}) {
  const div = document.createElement('div');
  div.className = 'card-container';
  if (opts.disabled) div.classList.add('disabled');
  if (opts.storyteller) div.classList.add('storyteller-card');
  div.dataset.cardId = cardId;
  const img = document.createElement('img');
  // cardId is like "card_3" → index 3
  const idx = parseInt(cardId.split('_')[1]);
  img.src = IMAGE_FILES[idx];
  img.draggable = false;
  div.appendChild(img);
  if (opts.label) {
    const lbl = document.createElement('span');
    lbl.className = 'card-number';
    lbl.textContent = opts.label;
    div.appendChild(lbl);
  }
  return div;
}

function copyCode() {
  navigator.clipboard.writeText(NET.roomCode).catch(() => {});
  const toast = document.getElementById('copied-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

function toggleScores() {
  document.getElementById('scores-panel').classList.toggle('open');
}

// ============================================================
// PEERJS — CREATE ROOM (HOST)
// ============================================================
function doCreate() {
  const name = document.getElementById('create-name').value.trim();
  if (!name) return;
  const status = document.getElementById('create-status');
  status.style.display = 'block';
  status.textContent = 'Подключение...';
  document.getElementById('create-btn').disabled = true;

  NET.myName = name;
  NET.isHost = true;
  NET.roomCode = genRoomCode();
  NET.myIdx = 0;

  HOST.winScore = getSelectedScore();
  HOST.players = [{ name, score: 0, hand: [], conn: null }];
  HOST.phase = 'lobby';

  const peerId = PEER_PREFIX + NET.roomCode;
  NET.peer = new Peer(peerId, { debug: 0 });

  NET.peer.on('open', () => {
    status.style.display = 'none';
    document.getElementById('create-btn').disabled = false;
    showLobby();
  });

  NET.peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      // Room code collision — retry
      NET.roomCode = genRoomCode();
      NET.peer.destroy();
      doCreate();
      return;
    }
    status.textContent = 'Ошибка: ' + err.message;
    document.getElementById('create-btn').disabled = false;
  });

  NET.peer.on('connection', (conn) => {
    conn.on('open', () => {
      conn.on('data', (data) => hostOnMessage(conn, data));
    });
    conn.on('close', () => hostOnDisconnect(conn));
  });
}

// ============================================================
// PEERJS — JOIN ROOM (CLIENT)
// ============================================================
function doJoin() {
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name || code.length !== 4) return;

  const status = document.getElementById('join-status');
  status.style.display = 'block';
  status.textContent = 'Подключение...';
  document.getElementById('join-btn').disabled = true;

  NET.myName = name;
  NET.isHost = false;
  NET.roomCode = code;

  NET.peer = new Peer(undefined, { debug: 0 });

  NET.peer.on('open', () => {
    const conn = NET.peer.connect(PEER_PREFIX + code, { reliable: true });
    NET.hostConn = conn;

    conn.on('open', () => {
      conn.send({ type: 'join', name });
    });

    conn.on('data', (data) => clientOnMessage(data));

    conn.on('close', () => {
      showStatus('Соединение с хостом потеряно');
      showTitle();
    });

    conn.on('error', () => {
      status.textContent = 'Не удалось подключиться';
      document.getElementById('join-btn').disabled = false;
    });

    // Timeout
    setTimeout(() => {
      if (!conn.open) {
        status.textContent = 'Комната не найдена';
        document.getElementById('join-btn').disabled = false;
        conn.close();
      }
    }, 8000);
  });

  NET.peer.on('error', (err) => {
    status.textContent = 'Ошибка: ' + err.message;
    document.getElementById('join-btn').disabled = false;
  });
}

// ============================================================
// LOBBY
// ============================================================
function showLobby() {
  document.getElementById('lobby-code').textContent = NET.roomCode;
  updateLobbyUI();
  showScreen('lobby-screen');
}

function updateLobbyUI() {
  const list = document.getElementById('lobby-players');
  const players = NET.isHost ? HOST.players : (localState?.players || []);
  list.innerHTML = '';
  players.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'player-list-item';
    item.innerHTML = `
      <span class="player-dot"></span>
      <span>${p.name}</span>
      ${i === 0 ? '<span class="host-badge">хост</span>' : ''}
    `;
    list.appendChild(item);
  });

  const scoreLabel = document.getElementById('lobby-score-label');
  const ws = NET.isHost ? HOST.winScore : (localState?.winScore || 32);
  scoreLabel.textContent = `Играем до ${ws} очков`;

  const startBtn = document.getElementById('lobby-start-btn');
  const waitMsg = document.getElementById('lobby-wait');
  if (NET.isHost) {
    startBtn.style.display = 'inline-block';
    startBtn.disabled = players.length < 2;
    waitMsg.style.display = 'none';
  } else {
    startBtn.style.display = 'none';
    waitMsg.style.display = 'block';
  }
}

// ============================================================
// HOST — MESSAGE HANDLING
// ============================================================
function hostOnMessage(conn, data) {
  if (data.type === 'join') {
    if (HOST.phase !== 'lobby') {
      conn.send({ type: 'error', msg: 'Игра уже началась' });
      return;
    }
    if (HOST.players.length >= 4) {
      conn.send({ type: 'error', msg: 'Комната заполнена (макс. 4)' });
      return;
    }
    const idx = HOST.players.length;
    HOST.players.push({ name: data.name, score: 0, hand: [], conn });
    NET.conns.push({ conn, playerIdx: idx });
    conn.send({ type: 'joined', playerIdx: idx });
    hostBroadcastLobby();
    updateLobbyUI();
    return;
  }

  // Find player idx for this connection
  const entry = NET.conns.find(c => c.conn === conn);
  if (!entry) return;
  const pidx = entry.playerIdx;

  if (data.type === 'storyteller') {
    hostOnStoryteller(pidx, data.cardId, data.clue);
  } else if (data.type === 'contribute') {
    hostOnContribute(pidx, data.cardId);
  } else if (data.type === 'vote') {
    hostOnVote(pidx, data.cardId);
  }
}

function hostOnDisconnect(conn) {
  const entry = NET.conns.find(c => c.conn === conn);
  if (!entry) return;
  const name = HOST.players[entry.playerIdx]?.name || '?';
  showStatus(`${name} отключился`);
  // In lobby: remove player
  if (HOST.phase === 'lobby') {
    HOST.players.splice(entry.playerIdx, 1);
    NET.conns = NET.conns.filter(c => c.conn !== conn);
    // Re-index
    NET.conns.forEach((c, i) => c.playerIdx = i + 1);
    hostBroadcastLobby();
    updateLobbyUI();
  }
}

function hostBroadcastLobby() {
  const msg = {
    type: 'lobby',
    players: HOST.players.map(p => ({ name: p.name })),
    winScore: HOST.winScore,
    roomCode: NET.roomCode,
    imageFiles: IMAGE_FILES
  };
  NET.conns.forEach(c => c.conn.send(msg));
}

function hostBroadcast(msg) {
  NET.conns.forEach(c => c.conn.send(msg));
}

/* Send personalized state to each player */
function hostSendState() {
  const base = {
    type: 'state',
    phase: HOST.phase,
    players: HOST.players.map(p => ({ name: p.name, score: p.score })),
    round: HOST.round,
    winScore: HOST.winScore,
    storytellerIdx: HOST.storytellerIdx,
    clue: HOST.clue,
    contributedCount: HOST.contributions.length - 1, // minus storyteller
    totalNonSt: HOST.players.length - 1,
    cardsNeeded: HOST.players.length < 4 ? 2 : 1,
    votedCount: HOST.votes.length,
  };

  HOST.players.forEach((p, idx) => {
    const state = { ...base, myIdx: idx, hand: [...p.hand] };

    // Vote phase: send shuffled pool
    if (HOST.phase === 'vote' || HOST.phase === 'results') {
      state.pool = HOST.shuffledPool.map(e => e.cardId);
    }
    if (HOST.phase === 'contribute') {
      const cardsNeeded = HOST.players.length < 4 ? 2 : 1;
      const myContribs = HOST.contributions.filter(c => c.playerIdx === idx).length;
      const isSt = idx === HOST.storytellerIdx;
      state.myContribCount = isSt ? 0 : myContribs;
      state.totalContribNeeded = (HOST.players.length - 1) * cardsNeeded;
      state.alreadyContributed = !isSt && myContribs >= cardsNeeded;
    }
    if (HOST.phase === 'vote') {
      state.ownCardIds = HOST.contributions.filter(c => c.playerIdx === idx).map(c => c.cardId);
      state.alreadyVoted = HOST.votes.some(v => v.voterIdx === idx);
    }
    if (HOST.phase === 'results') {
      state.results = {
        storytellerCard: HOST.storytellerCard,
        pool: HOST.shuffledPool.map(e => ({
          cardId: e.cardId,
          ownerIdx: e.ownerIdx,
          ownerName: HOST.players[e.ownerIdx].name,
          isStoryteller: e.cardId === HOST.storytellerCard,
          voters: HOST.votes.filter(v => v.cardId === e.cardId).map(v => HOST.players[v.voterIdx].name)
        })),
        roundScores: HOST.roundScores,
        isGameOver: HOST.players.some(p => p.score >= HOST.winScore)
      };
    }

    if (idx === 0) {
      // Host player — handle locally
      localState = state;
      renderGame(state);
    } else {
      p.conn?.send(state);
    }
  });
}

// ============================================================
// HOST — GAME LOGIC
// ============================================================
function doStartGame() {
  if (HOST.players.length < 2) return;

  const totalCards = IMAGE_FILES.length;
  const minNeeded = HOST.players.length * 2; // at least 2 per player
  if (totalCards < minNeeded) {
    showStatus(`Недостаточно карт! Нужно минимум ${minNeeded}, есть ${totalCards}. Добавьте изображения.`);
    return;
  }

  // Generate card IDs
  HOST.allCardIds = IMAGE_FILES.map((_, i) => 'card_' + i);
  HOST.round = 0;
  HOST.storytellerIdx = 0;

  // Reset scores
  HOST.players.forEach(p => { p.score = 0; p.hand = []; });

  // Deal initial hands
  dealHands();
  hostStartRound();
}

function dealHands() {
  // Collect all cards currently in someone's hand
  const inHands = new Set();
  HOST.players.forEach(p => p.hand.forEach(c => inHands.add(c)));

  // All cards NOT in any hand go into the deck
  HOST.deck = shuffle(HOST.allCardIds.filter(id => !inHands.has(id)));

  // Deal one card at a time in round-robin to be fair
  let dealing = true;
  while (dealing) {
    dealing = false;
    for (const p of HOST.players) {
      if (p.hand.length < HAND_SIZE && HOST.deck.length > 0) {
        p.hand.push(HOST.deck.pop());
        dealing = true;
      }
    }
  }
}

function hostStartRound() {
  HOST.round++;
  HOST.storytellerCard = null;
  HOST.clue = '';
  HOST.contributions = [];
  HOST.votes = [];
  HOST.shuffledPool = [];
  HOST.roundScores = {};
  HOST.phase = 'storyteller';

  hostSendState();
}

function hostOnStoryteller(pidx, cardId, clue) {
  if (HOST.phase !== 'storyteller' || pidx !== HOST.storytellerIdx) return;
  HOST.storytellerCard = cardId;
  HOST.clue = clue;
  // Remove card from hand
  HOST.players[pidx].hand = HOST.players[pidx].hand.filter(c => c !== cardId);
  HOST.contributions.push({ playerIdx: pidx, cardId });
  HOST.phase = 'contribute';
  hostSendState();

  // If only 2 players, skip to vote if the other has auto-contributed (they won't — need to pick)
  // Check if all non-storytellers have contributed
  checkContributeDone();
}

function hostOnContribute(pidx, cardId) {
  if (HOST.phase !== 'contribute') return;
  if (pidx === HOST.storytellerIdx) return;
  const cardsNeeded = HOST.players.length < 4 ? 2 : 1;
  const myContribs = HOST.contributions.filter(c => c.playerIdx === pidx).length;
  if (myContribs >= cardsNeeded) return; // already contributed enough
  HOST.players[pidx].hand = HOST.players[pidx].hand.filter(c => c !== cardId);
  HOST.contributions.push({ playerIdx: pidx, cardId });
  hostSendState();
  checkContributeDone();
}

function checkContributeDone() {
  const cardsNeeded = HOST.players.length < 4 ? 2 : 1;
  const needed = 1 + (HOST.players.length - 1) * cardsNeeded; // storyteller(1) + others * cardsNeeded
  if (HOST.contributions.length >= needed) {
    HOST.shuffledPool = shuffle(HOST.contributions.map(c => ({ cardId: c.cardId, ownerIdx: c.playerIdx })));
    HOST.phase = 'vote';
    hostSendState();
    checkVoteDone(); // in case storyteller auto-skips
  }
}

function hostOnVote(pidx, cardId) {
  if (HOST.phase !== 'vote') return;
  if (pidx === HOST.storytellerIdx) return;
  if (HOST.votes.find(v => v.voterIdx === pidx)) return;
  HOST.votes.push({ voterIdx: pidx, cardId });
  hostSendState();
  checkVoteDone();
}

function checkVoteDone() {
  const needed = HOST.players.length - 1; // all except storyteller
  if (HOST.votes.length >= needed) {
    calculateScores();
    HOST.phase = 'results';
    hostSendState();
  }
}

function calculateScores() {
  const scores = {};
  HOST.players.forEach((_, i) => scores[i] = 0);

  const stCard = HOST.storytellerCard;
  const stIdx = HOST.storytellerIdx;
  const nonSt = HOST.players.map((_, i) => i).filter(i => i !== stIdx);
  const correctVoters = HOST.votes.filter(v => v.cardId === stCard);
  const allFound = correctVoters.length === nonSt.length;
  const noneFound = correctVoters.length === 0;

  if (allFound || noneFound) {
    nonSt.forEach(i => scores[i] += 2);
  } else {
    scores[stIdx] += 3;
    correctVoters.forEach(v => scores[v.voterIdx] += 3);
  }

  // Bluff bonus (count votes on ALL cards contributed by each player)
  nonSt.forEach(ownerIdx => {
    const ownerCards = HOST.contributions.filter(c => c.playerIdx === ownerIdx).map(c => c.cardId);
    ownerCards.forEach(cardId => {
      const votesOn = HOST.votes.filter(v => v.cardId === cardId).length;
      scores[ownerIdx] += votesOn;
    });
  });

  // Apply
  HOST.players.forEach((p, i) => p.score += scores[i]);
  HOST.roundScores = scores;
}

function hostNextRound() {
  // Check game over
  if (HOST.players.some(p => p.score >= HOST.winScore)) {
    return;
  }

  // Rotate storyteller
  HOST.storytellerIdx = (HOST.storytellerIdx + 1) % HOST.players.length;

  // Refill all hands to HAND_SIZE
  dealHands();

  hostStartRound();
}

// ============================================================
// CLIENT — MESSAGE HANDLING
// ============================================================
function clientOnMessage(data) {
  if (data.type === 'joined') {
    NET.myIdx = data.playerIdx;
    return;
  }
  if (data.type === 'lobby') {
    localState = data;
    if (data.imageFiles) IMAGE_FILES = data.imageFiles;
    document.getElementById('lobby-code').textContent = data.roomCode;
    document.getElementById('join-status').style.display = 'none';
    document.getElementById('join-btn').disabled = false;
    updateLobbyUI();
    showScreen('lobby-screen');
    return;
  }
  if (data.type === 'state') {
    localState = data;
    renderGame(data);
    return;
  }
  if (data.type === 'error') {
    showStatus(data.msg);
    return;
  }
}

function sendToHost(msg) {
  if (NET.isHost) {
    // Host player — handle locally
    hostOnMessage(null, { ...msg, _fromHost: true });
  } else if (NET.hostConn) {
    NET.hostConn.send(msg);
  }
}

// ============================================================
// GAME RENDERING
// ============================================================
function renderGame(state) {
  if (!state || state.type !== 'state') return;
  showScreen('game-screen');

  document.getElementById('gh-round').textContent = state.round;
  document.getElementById('gh-name').textContent = state.players[state.myIdx]?.name || '';
  updateScoresPanel(state);

  const body = document.getElementById('game-body');
  body.innerHTML = '';
  handIsSelectable = false;

  switch (state.phase) {
    case 'storyteller': renderStoryteller(body, state); break;
    case 'contribute': renderContribute(body, state); break;
    case 'vote': renderVote(body, state); break;
    case 'results': renderResults(body, state); break;
  }

  // Always render hand at the bottom (unless makeHandSelectable already set it up)
  if (!handIsSelectable) {
    renderMyHand(state);
  }
}

function renderMyHand(state) {
  const container = document.getElementById('my-hand');
  container.innerHTML = '';
  if (!state.hand || state.hand.length === 0) {
    document.getElementById('my-hand-area').style.display = 'none';
    return;
  }
  document.getElementById('my-hand-area').style.display = 'block';
  state.hand.forEach(cardId => {
    const el = createCardElement(cardId);
    el.style.cursor = 'default';
    container.appendChild(el);
  });
}

let selectedCards = [];
let handIsSelectable = false;

function makeHandSelectable(state, count) {
  handIsSelectable = true;
  selectedCard = null;
  selectedCards = [];
  const container = document.getElementById('my-hand');
  container.innerHTML = '';
  document.getElementById('my-hand-area').style.display = 'block';
  if (!state.hand) return;
  state.hand.forEach(cardId => {
    const el = createCardElement(cardId);
    el.classList.add('selectable');
    el.addEventListener('click', () => {
      if (count === 1) {
        container.querySelectorAll('.card-container').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedCard = cardId;
        selectedCards = [cardId];
      } else {
        if (el.classList.contains('selected')) {
          el.classList.remove('selected');
          selectedCards = selectedCards.filter(c => c !== cardId);
        } else {
          if (selectedCards.length >= count) return;
          el.classList.add('selected');
          selectedCards.push(cardId);
        }
        selectedCard = selectedCards.length > 0 ? selectedCards[0] : null;
      }
      updateSubmitButtons(count);
    });
    container.appendChild(el);
  });
}

function updateSubmitButtons(count) {
  const ready = selectedCards.length >= count;
  const clueBtn = document.getElementById('submit-clue-btn');
  const ctBtn = document.getElementById('submit-ct-btn');
  if (clueBtn) {
    const clue = document.getElementById('clue-input')?.value.trim();
    clueBtn.disabled = !(selectedCard && clue);
  }
  if (ctBtn) {
    ctBtn.disabled = !ready;
  }
}

function updateScoresPanel(state) {
  const list = document.getElementById('scores-list');
  list.innerHTML = '';
  const sorted = state.players.map((p, i) => ({ ...p, idx: i }))
    .sort((a, b) => b.score - a.score);
  sorted.forEach(p => {
    const div = document.createElement('div');
    div.className = 'sp-entry' + (p.idx === state.storytellerIdx ? ' storyteller' : '');
    div.innerHTML = `
      <span class="sp-name">${p.name}${p.idx === state.storytellerIdx ? ' ★' : ''}</span>
      <span class="sp-pts">${p.score}</span>
    `;
    list.appendChild(div);
  });
}

// --- STORYTELLER PHASE ---
function renderStoryteller(body, state) {
  const isSt = state.myIdx === state.storytellerIdx;
  const stName = state.players[state.storytellerIdx].name;

  if (isSt) {
    body.innerHTML = `
      <div class="phase-label">Ты — рассказчик</div>
      <p class="text-dim text-small text-center" style="max-width:340px;">
        Выбери карту из руки внизу и придумай к ней ассоциацию.
      </p>
      <div class="clue-input-area">
        <input class="input-field" id="clue-input" type="text" placeholder="Твоя ассоциация…" maxlength="100" autocomplete="off">
        <button class="btn btn--small" id="submit-clue-btn" onclick="doSubmitClue()" disabled>Ок</button>
      </div>
    `;
    selectedCard = null;
    makeHandSelectable(state, 1);
    document.getElementById('clue-input').addEventListener('input', updateClueBtn);
  } else {
    body.innerHTML = `
      <div class="waiting-msg">${stName} придумывает ассоциацию<span class="waiting-dots">...</span></div>
    `;
  }
}

function updateClueBtn() {
  const btn = document.getElementById('submit-clue-btn');
  if (!btn) return;
  const clue = document.getElementById('clue-input')?.value.trim();
  btn.disabled = !(selectedCards.length >= 1 && clue);
}

function doSubmitClue() {
  const clue = document.getElementById('clue-input').value.trim();
  if (!selectedCard || !clue) return;
  if (NET.isHost) {
    hostOnStoryteller(0, selectedCard, clue);
  } else {
    sendToHost({ type: 'storyteller', cardId: selectedCard, clue });
  }
}

// --- CONTRIBUTE PHASE ---
function renderContribute(body, state) {
  const isSt = state.myIdx === state.storytellerIdx;
  const needCards = state.cardsNeeded || 1;
  const myContribCount = state.myContribCount || 0;

  if (isSt) {
    body.innerHTML = `
      <div class="phase-label">Ассоциация</div>
      <div class="clue-display">"${state.clue}"</div>
      <div class="waiting-msg">Игроки выбирают карты<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.contributedCount} / ${state.totalContribNeeded}</div>
    `;
    return;
  }

  if (state.alreadyContributed) {
    body.innerHTML = `
      <div class="phase-label">Ассоциация</div>
      <div class="clue-display">"${state.clue}"</div>
      <div class="waiting-msg">Ожидание остальных<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.contributedCount} / ${state.totalContribNeeded}</div>
    `;
    return;
  }

  const remaining = needCards - myContribCount;
  body.innerHTML = `
    <div class="phase-label">Блеф</div>
    <div class="clue-display">"${state.clue}"</div>
    <p class="text-dim text-small text-center" style="max-width:320px;">
      Выбери ${remaining > 1 ? remaining + ' карты' : 'карту'}, ${remaining > 1 ? 'которые подходят' : 'которая подходит'} под ассоциацию.
    </p>
    <button class="btn btn--small" id="submit-ct-btn" onclick="doSubmitContribute()" disabled>Отправить</button>
  `;
  selectedCard = null;
  makeHandSelectable(state, remaining);
}

function doSubmitContribute() {
  if (selectedCards.length === 0) return;
  selectedCards.forEach(cardId => {
    if (NET.isHost) {
      hostOnContribute(0, cardId);
    } else {
      sendToHost({ type: 'contribute', cardId });
    }
  });
}

// --- VOTE PHASE ---
function renderVote(body, state) {
  const isSt = state.myIdx === state.storytellerIdx;

  if (isSt) {
    body.innerHTML = `
      <div class="phase-label">Голосование</div>
      <div class="clue-display">"${state.clue}"</div>
      <div class="voting-grid" id="vt-grid"></div>
      <div class="waiting-msg" style="font-size:16px;">Игроки голосуют<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.votedCount} / ${state.totalNonSt}</div>
    `;
    const grid = document.getElementById('vt-grid');
    state.pool.forEach((cardId, i) => {
      const el = createCardElement(cardId, { label: String(i + 1) });
      el.style.cursor = 'default';
      grid.appendChild(el);
    });
    return;
  }

  if (state.alreadyVoted) {
    body.innerHTML = `
      <div class="phase-label">Голосование</div>
      <div class="clue-display">"${state.clue}"</div>
      <div class="waiting-msg">Ожидание остальных<span class="waiting-dots">...</span></div>
      <div class="waiting-progress">${state.votedCount} / ${state.totalNonSt}</div>
    `;
    return;
  }

  body.innerHTML = `
    <div class="phase-label">Голосование</div>
    <div class="clue-display">"${state.clue}"</div>
    <p class="text-dim text-small text-center">Какая карта принадлежит рассказчику?</p>
    <div class="voting-grid" id="vt-grid"></div>
    <button class="btn btn--small" id="submit-vt-btn" onclick="doSubmitVote()" disabled>Голосовать</button>
  `;
  selectedCard = null;
  const grid = document.getElementById('vt-grid');
  const ownCards = state.ownCardIds || (state.ownCardId ? [state.ownCardId] : []);
  state.pool.forEach((cardId, i) => {
    const isOwn = ownCards.includes(cardId);
    const el = createCardElement(cardId, { disabled: isOwn, label: String(i + 1) });
    el.addEventListener('click', () => {
      if (isOwn) return;
      grid.querySelectorAll('.card-container').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedCard = cardId;
      document.getElementById('submit-vt-btn').disabled = false;
    });
    grid.appendChild(el);
  });
}

function doSubmitVote() {
  if (!selectedCard) return;
  if (NET.isHost) {
    hostOnVote(0, selectedCard);
  } else {
    sendToHost({ type: 'vote', cardId: selectedCard });
  }
}

// --- RESULTS PHASE ---
function renderResults(body, state) {
  const res = state.results;
  if (!res) return;

  const isGameOver = res.isGameOver;
  let html = '';

  if (isGameOver) {
    // Full game over screen with leaderboard
    const winner = state.players.reduce((a, b) => a.score >= b.score ? a : b);
    const medals = ['🥇', '🥈', '🥉'];
    const tierClass = ['gold', 'silver', 'bronze'];
    const leaderboard = state.players.map((p, i) => ({ name: p.name, score: p.score, idx: i }))
      .sort((a, b) => b.score - a.score);

    html += `<div class="game-over-banner">${winner.name} побеждает!</div>`;
    html += `<div class="game-over-sub">${winner.score} очков за ${state.round} раундов</div>`;
    html += `<div class="leaderboard">`;
    leaderboard.forEach((p, i) => {
      const cls = i < 3 ? ` ${tierClass[i]}` : '';
      const medal = i < 3 ? medals[i] : `${i + 1}.`;
      html += `<div class="lb-entry${cls}">
        <span class="lb-place">${medal}</span>
        <span class="lb-name">${p.name}</span>
        <span class="lb-score">${p.score}</span>
      </div>`;
    });
    html += `</div>`;
    html += `<button class="btn mt-12" onclick="showTitle()">На главную</button>`;
  } else {
    html += `<div class="phase-label">Раскрытие</div>`;
    html += `<div class="clue-display">"${state.clue}"</div>`;
    html += `<div class="results-cards-area">`;
    res.pool.forEach(entry => {
      const isSt = entry.isStoryteller;
      html += `<div class="result-card-wrapper">`;
      html += `<div class="card-container${isSt ? ' storyteller-card' : ''}" style="cursor:default;">`;
      const idx = parseInt(entry.cardId.split('_')[1]);
      html += `<img src="${IMAGE_FILES[idx]}" draggable="false" style="width:100%;height:100%;display:block;object-fit:cover;">`;
      html += `</div>`;
      html += `<div class="owner-label${isSt ? ' storyteller' : ''}">${entry.ownerName}${isSt ? ' ★' : ''}</div>`;
      if (entry.voters.length > 0) {
        html += `<div class="votes-list">Голоса: ${entry.voters.join(', ')}</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;

    // Score changes
    html += `<div class="score-changes">`;
    html += `<div style="color:var(--text-dim);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Очки за раунд</div>`;
    const sorted = state.players.map((p, i) => ({ name: p.name, pts: res.roundScores[i] || 0, total: p.score }))
      .sort((a, b) => b.pts - a.pts);
    sorted.forEach(e => {
      html += `<div class="score-row">
        <span class="name">${e.name}</span>
        <span class="points ${e.pts === 0 ? 'zero' : ''}">+${e.pts} (${e.total})</span>
      </div>`;
    });
    html += `</div>`;

    if (NET.isHost) {
      html += `<button class="btn mt-12" onclick="hostNextRound()">Следующий раунд</button>`;
    } else {
      html += `<div class="waiting-msg" style="font-size:14px;margin-top:12px;">Ожидание хоста<span class="waiting-dots">...</span></div>`;
    }
  }

  body.innerHTML = html;
}

// ============================================================
// HOST PLAYER ACTIONS (idx 0)
// ============================================================
// Host actions go through the same hostOn* functions but we
// need to handle the case where conn is null (local player).
// We already handle this — hostOnMessage checks for _fromHost
// but actually the direct calls from doSubmitClue etc. bypass it.
// The direct calls in doSubmitClue/doSubmitContribute/doSubmitVote
// already call hostOnStoryteller/etc. directly for host. Good.

// ============================================================
// INDEXEDDB — LOCAL IMAGE STORAGE
// ============================================================
let customImages = []; // [{id, dataUrl, name}]

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('xaxit-images', 1);
    req.onupgradeneeded = () => {
      if (!req.result.objectStoreNames.contains('images')) {
        req.result.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbLoadCustom() {
  try {
    const db = await openDB();
    return new Promise(r => {
      const tx = db.transaction('images', 'readonly');
      const req = tx.objectStore('images').getAll();
      req.onsuccess = () => r(req.result || []);
      req.onerror = () => r([]);
    });
  } catch { return []; }
}

async function dbSaveCustom(dataUrl, name) {
  const db = await openDB();
  return new Promise(r => {
    const tx = db.transaction('images', 'readwrite');
    const req = tx.objectStore('images').add({ dataUrl, name, addedAt: Date.now() });
    req.onsuccess = () => r(req.result);
  });
}

async function dbDeleteCustom(id) {
  const db = await openDB();
  return new Promise(r => {
    const tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').delete(id);
    tx.oncomplete = () => r();
  });
}

function getDeletedDefaults() {
  try { return JSON.parse(localStorage.getItem('xaxit-deleted-defaults') || '[]'); }
  catch { return []; }
}

function saveDeletedDefaults(list) {
  localStorage.setItem('xaxit-deleted-defaults', JSON.stringify(list));
}

function rebuildImageFiles() {
  const deleted = new Set(getDeletedDefaults());
  const activeDefaults = DEFAULT_IMAGES.filter(f => !deleted.has(f));
  IMAGE_FILES = [...activeDefaults, ...customImages.map(c => c.dataUrl)];
}

async function initImages() {
  customImages = await dbLoadCustom();
  rebuildImageFiles();
}

// ============================================================
// CROP MODAL
// ============================================================
const cropState = {
  img: null,
  fileName: '',
  scale: 1,
  minScale: 1,
  offsetX: 0,
  offsetY: 0,
  dragging: false,
  startX: 0,
  startY: 0,
  containerW: 0,
  containerH: 0
};

function openCropModal(file) {
  if (!file || !file.type.startsWith('image/')) return;
  if (file.size > 10 * 1024 * 1024) { showStatus('Файл слишком большой (макс. 10 МБ)'); return; }

  cropState.fileName = file.name;
  const overlay = document.getElementById('crop-overlay');
  overlay.classList.add('open');

  const img = new Image();
  img.onload = () => {
    cropState.img = img;
    const container = document.getElementById('crop-container');
    container.innerHTML = '';
    const rect = container.getBoundingClientRect();
    cropState.containerW = rect.width;
    cropState.containerH = rect.height;

    const scaleX = cropState.containerW / img.naturalWidth;
    const scaleY = cropState.containerH / img.naturalHeight;
    cropState.minScale = Math.max(scaleX, scaleY);
    cropState.scale = cropState.minScale;
    cropState.offsetX = (cropState.containerW - img.naturalWidth * cropState.scale) / 2;
    cropState.offsetY = (cropState.containerH - img.naturalHeight * cropState.scale) / 2;

    const el = document.createElement('img');
    el.src = img.src;
    el.draggable = false;
    container.appendChild(el);
    updateCropPreview();

    const slider = document.getElementById('crop-zoom');
    slider.min = cropState.minScale;
    slider.max = cropState.minScale * 3;
    slider.step = 0.001;
    slider.value = cropState.scale;
  };
  img.src = URL.createObjectURL(file);

  const container = document.getElementById('crop-container');
  container.onmousedown = cropDragStart;
  container.ontouchstart = cropDragStart;
  document.onmousemove = cropDragMove;
  document.ontouchmove = cropDragMove;
  document.onmouseup = cropDragEnd;
  document.ontouchend = cropDragEnd;
}

function updateCropPreview() {
  const container = document.getElementById('crop-container');
  const el = container.querySelector('img');
  if (!el || !cropState.img) return;
  el.style.width = (cropState.img.naturalWidth * cropState.scale) + 'px';
  el.style.height = (cropState.img.naturalHeight * cropState.scale) + 'px';
  el.style.left = cropState.offsetX + 'px';
  el.style.top = cropState.offsetY + 'px';
}

function constrainCropOffset() {
  const w = cropState.img.naturalWidth * cropState.scale;
  const h = cropState.img.naturalHeight * cropState.scale;
  cropState.offsetX = Math.min(0, Math.max(cropState.containerW - w, cropState.offsetX));
  cropState.offsetY = Math.min(0, Math.max(cropState.containerH - h, cropState.offsetY));
}

function cropDragStart(e) {
  e.preventDefault();
  cropState.dragging = true;
  const pt = e.touches ? e.touches[0] : e;
  cropState.startX = pt.clientX - cropState.offsetX;
  cropState.startY = pt.clientY - cropState.offsetY;
}

function cropDragMove(e) {
  if (!cropState.dragging) return;
  e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  cropState.offsetX = pt.clientX - cropState.startX;
  cropState.offsetY = pt.clientY - cropState.startY;
  constrainCropOffset();
  updateCropPreview();
}

function cropDragEnd() {
  cropState.dragging = false;
}

function cropZoom(val) {
  const cx = cropState.containerW / 2;
  const cy = cropState.containerH / 2;
  const imgX = (cx - cropState.offsetX) / cropState.scale;
  const imgY = (cy - cropState.offsetY) / cropState.scale;
  cropState.scale = parseFloat(val);
  cropState.offsetX = cx - imgX * cropState.scale;
  cropState.offsetY = cy - imgY * cropState.scale;
  constrainCropOffset();
  updateCropPreview();
}

async function cropSave() {
  if (!cropState.img) return;
  const canvas = document.createElement('canvas');
  canvas.width = 600;
  canvas.height = 840;
  const ctx = canvas.getContext('2d');
  const sx = -cropState.offsetX / cropState.scale;
  const sy = -cropState.offsetY / cropState.scale;
  const sw = cropState.containerW / cropState.scale;
  const sh = cropState.containerH / cropState.scale;
  ctx.drawImage(cropState.img, sx, sy, sw, sh, 0, 0, 600, 840);

  let q = 0.8;
  let dataUrl = canvas.toDataURL('image/jpeg', q);
  while (dataUrl.length > 300 * 1370 && q > 0.2) {
    q -= 0.1;
    dataUrl = canvas.toDataURL('image/jpeg', q);
  }

  URL.revokeObjectURL(cropState.img.src);
  closeCropModal();

  const id = await dbSaveCustom(dataUrl, cropState.fileName);
  customImages.push({ id, dataUrl, name: cropState.fileName });
  rebuildImageFiles();
  renderAdminGallery();
  showStatus('Изображение добавлено!');
}

function closeCropModal() {
  document.getElementById('crop-overlay').classList.remove('open');
  document.getElementById('crop-container').innerHTML = '';
  document.onmousemove = null;
  document.ontouchmove = null;
  document.onmouseup = null;
  document.ontouchend = null;
  cropState.img = null;
  cropState.dragging = false;
}

// ============================================================
// ADMIN PANEL
// ============================================================
let adminAuthed = false;

function openAdmin() {
  document.getElementById('admin-overlay').classList.add('open');
  if (adminAuthed) {
    renderAdminGallery();
  } else {
    renderAdminPassword();
  }
}

function closeAdmin() {
  document.getElementById('admin-overlay').classList.remove('open');
}

function renderAdminPassword() {
  const body = document.getElementById('admin-body');
  body.innerHTML = `
    <div class="admin-password-form">
      <p class="text-dim text-small">Введите пароль администратора</p>
      <input class="input-field" id="admin-pw" type="password" placeholder="Пароль" autocomplete="off">
      <button class="btn btn--small" onclick="checkAdminPassword()">Войти</button>
      <p id="admin-pw-error" style="color:var(--danger);font-size:13px;display:none;">Неверный пароль</p>
    </div>
  `;
  setTimeout(() => document.getElementById('admin-pw')?.focus(), 100);
  document.getElementById('admin-pw')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkAdminPassword();
  });
}

function checkAdminPassword() {
  const pw = document.getElementById('admin-pw')?.value;
  if (pw === ADMIN_PASSWORD) {
    adminAuthed = true;
    renderAdminGallery();
  } else {
    const err = document.getElementById('admin-pw-error');
    if (err) err.style.display = 'block';
  }
}

function renderAdminGallery() {
  const deleted = new Set(getDeletedDefaults());
  const activeDefaults = DEFAULT_IMAGES.filter(f => !deleted.has(f));
  const body = document.getElementById('admin-body');
  const total = activeDefaults.length + customImages.length;

  let html = `
    <div class="admin-upload-area" id="admin-upload-area">
      <div style="font-size:28px;margin-bottom:8px;">📤</div>
      <div style="color:var(--text);font-size:14px;">Нажмите или перетащите файл</div>
      <div class="admin-upload-hint">
        JPG/PNG/WebP • Изображение обрезается под карточку (5:7)<br>
        Выходное разрешение: 600×840px • Сжатие до ~300 КБ
      </div>
      <input type="file" id="admin-file-input" accept="image/*">
    </div>
    <div class="admin-count">Всего карт: ${total} (базовых: ${activeDefaults.length}, добавленных: ${customImages.length})</div>
    <div class="admin-gallery" id="admin-gallery">
  `;

  activeDefaults.forEach((src) => {
    html += `
      <div class="admin-gallery-item">
        <img src="${src}" loading="lazy">
        <button class="delete-btn" onclick="adminDeleteDefault('${src.replace(/'/g, "\\'")}')" title="Удалить">🗑</button>
        <div class="img-badge">базовая</div>
      </div>
    `;
  });

  customImages.forEach((img) => {
    html += `
      <div class="admin-gallery-item">
        <img src="${img.dataUrl}" loading="lazy">
        <button class="delete-btn" onclick="adminDeleteCustom(${img.id})" title="Удалить">🗑</button>
        <div class="img-badge">${(img.name || 'custom').slice(0, 15)}</div>
      </div>
    `;
  });

  html += '</div>';
  body.innerHTML = html;

  const uploadArea = document.getElementById('admin-upload-area');
  const fileInput = document.getElementById('admin-file-input');
  uploadArea.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = 'var(--gold)'; });
  uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = '';
    if (e.dataTransfer.files.length > 0) openCropModal(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) openCropModal(fileInput.files[0]);
    fileInput.value = '';
  });
}

function adminDeleteDefault(filename) {
  const deleted = getDeletedDefaults();
  if (!deleted.includes(filename)) deleted.push(filename);
  saveDeletedDefaults(deleted);
  rebuildImageFiles();
  renderAdminGallery();
}

async function adminDeleteCustom(id) {
  await dbDeleteCustom(id);
  customImages = customImages.filter(c => c.id !== id);
  rebuildImageFiles();
  renderAdminGallery();
}

// ============================================================
// INIT
// ============================================================
(async () => {
  await initImages();
  showTitle();
})();
</script>
</body>
</html>
