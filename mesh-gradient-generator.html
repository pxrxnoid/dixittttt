<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mesh Gradient</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background: #e8e8e8;
  height: 100vh;
  display: flex;
  overflow: hidden;
  font-size: 12px;
  color: #1a1a1a;
}

/* ── Canvas side ── */
.stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.canvas-wrap {
  position: relative;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  border-radius: 6px;
  overflow: hidden;
  cursor: crosshair;
}
canvas { display: block; }

/* ── Side panel ── */
.panel {
  width: 220px;
  background: #fff;
  border-left: 1px solid #e0e0e0;
  display: flex;
  flex-direction: column;
  padding: 20px 16px;
  gap: 20px;
  overflow-y: auto;
}
.panel h1 { font-size: 13px; font-weight: 600; letter-spacing: -0.3px; }

.label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: #999;
  margin-bottom: 8px;
}

/* Palette dots */
.palettes { display: flex; flex-direction: column; gap: 6px; }
.pal-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 7px;
  border: 1px solid #e8e8e8;
  border-radius: 6px;
  cursor: pointer;
  transition: border-color .15s;
}
.pal-row:hover { border-color: #aaa; }
.pal-row.active { border-color: #3b82f6; background: #eff6ff; }
.pal-dot { width: 14px; height: 14px; border-radius: 50%; }
.pal-name { font-size: 11px; margin-left: 4px; color: #555; }

/* Buttons */
.btn {
  width: 100%;
  padding: 8px;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  background: #fff;
  font-size: 11px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { background: #f5f5f5; }
.btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn-primary:hover { background: #333; }
.btn-group { display: flex; flex-direction: column; gap: 6px; }

/* Size presets */
.presets { display: flex; flex-wrap: wrap; gap: 4px; }
.preset {
  padding: 3px 8px;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  background: #fff;
  font-size: 10px;
  cursor: pointer;
  transition: all .15s;
}
.preset:hover { border-color: #aaa; }
.preset.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

/* Background picker row */
.bg-row { display: flex; align-items: center; gap: 8px; }
.bg-row label { font-size: 11px; color: #666; flex: 1; }
input[type=color] {
  width: 28px; height: 22px;
  border: 1px solid #ddd; border-radius: 4px;
  padding: 1px; cursor: pointer; background: #fff;
}

.hint { font-size: 10px; color: #bbb; line-height: 1.7; }
.hint b { color: #999; font-weight: 500; }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="canvas-wrap" id="wrap">
    <canvas id="c"></canvas>
  </div>
</div>

<div class="panel">
  <div>
    <h1>Mesh Gradient</h1>
  </div>

  <div>
    <div class="label">Palette</div>
    <div class="palettes" id="palettes"></div>
  </div>

  <div>
    <div class="label">Canvas</div>
    <div class="presets" id="presets">
      <button class="preset" data-w="1080" data-h="1080">1:1</button>
      <button class="preset active" data-w="1080" data-h="1350">4:5</button>
      <button class="preset" data-w="1920" data-h="1080">16:9</button>
      <button class="preset" data-w="1080" data-h="1920">9:16</button>
    </div>
  </div>

  <div>
    <div class="bg-row">
      <label>Background</label>
      <input type="color" id="bgPicker" value="#F0EEE8">
    </div>
  </div>

  <div class="btn-group">
    <button class="btn" id="addBtn">+ Add orb</button>
    <button class="btn" id="shuffleBtn">Shuffle</button>
    <button class="btn btn-primary" id="exportBtn">Export PNG</button>
  </div>

  <div class="hint">
    <b>Drag</b> to move<br>
    <b>Scroll</b> to resize<br>
    <b>Double-click</b> delete<br>
    <b>R</b> shuffle &nbsp; <b>E</b> export
  </div>
</div>

<script>
const palettes = [
  { name: 'Soft',    colors: ['#7EDFA8','#5BCFED','#A8EDCF','#6BD4B8','#9FE8D5'] },
  { name: 'Vivid',   colors: ['#4ADE80','#38BDF8','#A78BFA','#F472B6','#FB923C'] },
  { name: 'Sunset',  colors: ['#FB923C','#F472B6','#FBBF24','#F87171','#C084FC'] },
  { name: 'Ocean',   colors: ['#06B6D4','#0EA5E9','#14B8A6','#38BDF8','#67E8F9'] },
  { name: 'Mono',    colors: ['#6B7280','#9CA3AF','#4B5563','#D1D5DB','#374151'] },
];

let W = 1080, H = 1350;
let bg = '#F0EEE8';
let activePal = 0;
let orbs = [];
let idSeq = 1;
let selectedId = null;

// Drag state
let drag = null, dragOffX = 0, dragOffY = 0;
let cursorX = W/2, cursorY = H/2;

const stage = document.getElementById('stage');
const wrap  = document.getElementById('wrap');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function makeOrb(x, y, color) {
  return {
    id: idSeq++,
    x: x ?? W * (.2 + Math.random() * .6),
    y: y ?? H * (.2 + Math.random() * .6),
    radius: 180 + Math.random() * 280,
    // Each orb has independent x/y scale to create the asymmetric smear look
    scaleX: 0.7 + Math.random() * 0.8,
    scaleY: 0.7 + Math.random() * 0.8,
    opacity: 0.75 + Math.random() * 0.25,
    color: color || palettes[activePal].colors[Math.floor(Math.random()*5)],
  };
}

function initOrbs() {
  orbs = [];
  const cols = palettes[activePal].colors;
  // positions to match reference — loose cross arrangement
  const pts = [
    [.42, .15], [.65, .38], [.22, .38], [.38, .62], [.58, .75]
  ];
  pts.forEach((p, i) => {
    orbs.push({
      id: idSeq++,
      x: W * p[0], y: H * p[1],
      radius: 220 + Math.random() * 200,
      scaleX: 0.8 + Math.random() * 0.5,
      scaleY: 0.8 + Math.random() * 0.5,
      opacity: 0.8 + Math.random() * 0.2,
      color: cols[i % cols.length],
    });
  });
}

function fitCanvas() {
  const aw = stage.clientWidth - 48;
  const ah = stage.clientHeight - 48;
  const s = Math.min(aw/W, ah/H);
  const dw = Math.round(W * s);
  const dh = Math.round(H * s);
  canvas.width = W;
  canvas.height = H;
  canvas.style.width  = dw + 'px';
  canvas.style.height = dh + 'px';
  wrap.style.width  = dw + 'px';
  wrap.style.height = dh + 'px';
}

function scale() { return canvas.width / wrap.clientWidth; }

function canvasXY(e) {
  const r = wrap.getBoundingClientRect();
  const s = scale();
  return { x: (e.clientX - r.left) * s, y: (e.clientY - r.top) * s };
}

function drawOrb(ctx, orb) {
  const {r,g,b} = hexToRgb(orb.color);
  ctx.save();
  // Move origin to orb center, scale to create ellipse, then draw circle
  ctx.translate(orb.x, orb.y);
  ctx.scale(orb.scaleX, orb.scaleY);

  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, orb.radius);
  grad.addColorStop(0,   `rgba(${r},${g},${b},${orb.opacity})`);
  grad.addColorStop(0.4, `rgba(${r},${g},${b},${orb.opacity * 0.7})`);
  grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);

  ctx.beginPath();
  ctx.arc(0, 0, orb.radius, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  for (const orb of orbs) drawOrb(ctx, orb);
}

function orbAt(x, y) {
  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i];
    const dx = (x - o.x) / o.scaleX, dy = (y - o.y) / o.scaleY;
    if (dx*dx + dy*dy < o.radius * o.radius) return o;
  }
  return null;
}

// ── Events ──
wrap.addEventListener('mousedown', e => {
  const {x,y} = canvasXY(e);
  const o = orbAt(x,y);
  if (o) {
    drag = o; dragOffX = o.x - x; dragOffY = o.y - y;
    selectedId = o.id;
  } else {
    selectedId = null;
  }
});

window.addEventListener('mousemove', e => {
  const r = wrap.getBoundingClientRect();
  const s = scale();
  cursorX = (e.clientX - r.left) * s;
  cursorY = (e.clientY - r.top)  * s;
  if (!drag) return;
  drag.x = cursorX + dragOffX;
  drag.y = cursorY + dragOffY;
  render();
});

window.addEventListener('mouseup', () => { drag = null; });

wrap.addEventListener('dblclick', e => {
  const {x,y} = canvasXY(e);
  const o = orbAt(x,y);
  if (o) { orbs = orbs.filter(b => b.id !== o.id); if (selectedId === o.id) selectedId = null; render(); }
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const {x,y} = canvasXY(e);
  const o = orbAt(x,y);
  if (o) { o.radius = Math.max(60, Math.min(900, o.radius - e.deltaY * 0.5)); render(); }
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'r' || e.key === 'R') shuffle();
  if (e.key === 'e' || e.key === 'E') exportPNG();
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedId) { orbs = orbs.filter(o => o.id !== selectedId); selectedId = null; render(); }
  }
});

// ── Panel ──
function buildPalettes() {
  const el = document.getElementById('palettes');
  el.innerHTML = '';
  palettes.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'pal-row' + (i === activePal ? ' active' : '');
    row.innerHTML = p.colors.slice(0,4).map(c => `<span class="pal-dot" style="background:${c}"></span>`).join('')
      + `<span class="pal-name">${p.name}</span>`;
    row.onclick = () => {
      activePal = i;
      orbs.forEach((o, j) => { o.color = p.colors[j % p.colors.length]; });
      render();
      buildPalettes();
    };
    el.appendChild(row);
  });
}

function buildPresets() {
  document.getElementById('presets').querySelectorAll('.preset').forEach(b => {
    b.classList.toggle('active', +b.dataset.w === W && +b.dataset.h === H);
    b.onclick = () => {
      W = +b.dataset.w; H = +b.dataset.h;
      fitCanvas(); render(); buildPresets();
    };
  });
}

document.getElementById('bgPicker').oninput = e => { bg = e.target.value; render(); };
document.getElementById('addBtn').onclick = () => {
  if (orbs.length >= 12) return;
  orbs.push(makeOrb(cursorX || W/2, cursorY || H/2));
  render();
};
document.getElementById('shuffleBtn').onclick = shuffle;
document.getElementById('exportBtn').onclick = exportPNG;

function shuffle() {
  const cols = palettes[activePal].colors;
  orbs.forEach(o => {
    o.x = W * (.1 + Math.random() * .8);
    o.y = H * (.1 + Math.random() * .8);
    o.radius = 160 + Math.random() * 300;
    o.scaleX = 0.7 + Math.random() * 0.8;
    o.scaleY = 0.7 + Math.random() * 0.8;
    o.opacity = 0.7 + Math.random() * 0.3;
    o.color = cols[Math.floor(Math.random() * cols.length)];
  });
  render();
}

function exportPNG() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const oc = off.getContext('2d');
  oc.fillStyle = bg;
  oc.fillRect(0, 0, W, H);
  for (const orb of orbs) drawOrb(oc, orb);
  const a = document.createElement('a');
  a.download = `mesh-${W}x${H}.png`;
  a.href = off.toDataURL('image/png');
  a.click();
}

new ResizeObserver(() => { fitCanvas(); render(); }).observe(stage);

initOrbs();
buildPalettes();
buildPresets();
fitCanvas();
render();
</script>
</body>
</html>
